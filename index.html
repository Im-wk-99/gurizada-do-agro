<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula OS | Elite Command</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="nebula-canvas"></div>
    <div class="scanline"></div>

    <aside id="main-nav">
        <div class="cyber-logo">
            <div class="logo-core"></div>
            <i class="fas fa-biohazard"></i>
        </div>
        
        <nav>
            <div class="nav-btn active" data-page="dash" onclick="App.route('dash')">
                <i class="fas fa-th-large"></i>
                <span>OVERVIEW</span>
            </div>
            <div class="nav-btn" data-page="stock" onclick="App.route('stock')">
                <i class="fas fa-microchip"></i>
                <span>ASSETS</span>
            </div>
            <div class="nav-btn" data-page="fin" onclick="App.route('fin')">
                <i class="fas fa-satellite-dish"></i>
                <span>MARKET</span>
            </div>
            <div class="nav-btn" data-page="eng" onclick="App.route('eng')">
                <i class="fas fa-atom"></i>
                <span>BIO-ENG</span>
            </div>
        </nav>

        <div class="system-health">
            <div class="bar"><div class="fill" style="width: 85%"></div></div>
            <small>CORE TEMP: 32°C</small>
        </div>
    </aside>

    <main id="app-core">
        <header class="glass-header">
            <div class="title-group">
                <h1 class="glitch" data-text="NEBULA">NEBULA <span class="neon-purple">v4.0</span></h1>
                <p class="subtitle">SISTEMA DE GESTÃO ESTRATÉGICA</p>
            </div>
            
            <div class="clock-module">
                <div id="digital-clock">00:00:00</div>
                <div class="date-stmp">30.APR.2026</div>
            </div>
        </header>

        <section id="viewport" class="content-scroll">
            </section>
    </main>

    <script>
        // Lógica de Transição e Renderização
        const App = {
            state: {
                current: 'dash',
                bgs: {
                    dash: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000',
                    stock: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2000',
                    fin: 'https://images.unsplash.com/photo-1639322537228-f710d846310a?q=80&w=2000',
                    eng: 'https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2000'
                }
            },

            init() {
                this.route('dash');
                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
            },

            updateClock() {
                document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString();
            },

            route(page) {
                const vp = document.getElementById('viewport');
                const canvas = document.getElementById('nebula-canvas');
                
                // Transição de Fundo
                canvas.style.backgroundImage = `url('${this.state.bgs[page]}')`;
                
                // Estilo Ativo
                document.querySelectorAll('.nav-btn').forEach(b => {
                    b.classList.remove('active');
                    if(b.dataset.page === page) b.classList.add('active');
                });

                this.render(page, vp);
            },

            render(page, target) {
                const templates = {
                    dash: `
                        <div class="dashboard-grid">
                            <div class="cyber-card glass tall">
                                <h3 class="neon-purple">SITREP TERMINAL</h3>
                                <div class="terminal-box">
                                    <p class="typewriter">> [INIT] Reconhecendo rede neural...</p>
                                    <p class="typewriter">> [DATA] Sensores de solo ativos em Reserva/PR.</p>
                                    <p class="typewriter">> [AI] Previsão de colheita: +18% acima da média.</p>
                                </div>
                            </div>
                            <div class="cyber-card glass center">
                                <span class="label">LIQUIDEZ TOTAL</span>
                                <h2 class="neon-greenCounter">R$ 1.250.400</h2>
                                <div class="mini-chart"></div>
                            </div>
                        </div>`,
                    stock: `<div class="cyber-card glass"><h3>INVENTÁRIO ATIVO</h3><div class="data-table">...carregando dados estelares...</div></div>`,
                    fin: `<div class="cyber-card glass"><h3>MARKET FLOW</h3><div class="chart-placeholder"></div></div>`,
                    eng: `<div class="cyber-card glass"><h3>BIO-ENGENHARIA</h3><p>Módulo de cálculo avançado ativo.</p></div>`
                };
                target.innerHTML = templates[page];
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
