<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroOS | Nebula Intelligence</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --purple: #bc13fe;
            --green: #20ff88;
            --bg: #030005;
            --surface: rgba(20, 10, 30, 0.6);
            --border: rgba(188, 19, 254, 0.3);
            --text: #e0d0ff;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: var(--bg); 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(188, 19, 254, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(32, 255, 136, 0.05) 0%, transparent 40%);
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
        }

        /* --- SIDEBAR FLUTUANTE --- */
        aside { 
            width: 90px; 
            background: var(--surface); 
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            margin: 20px;
            border-radius: 24px;
            display: flex; 
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            box-shadow: var(--shadow);
        }
        aside:hover { width: 260px; border-color: var(--purple); }

        .logo-box {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--purple), #7a00ff);
            border-radius: 16px;
            display: grid; place-items: center;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
            margin-bottom: 40px;
            flex-shrink: 0;
        }

        .nav-item {
            width: calc(100% - 20px);
            padding: 15px;
            margin: 5px 0;
            border-radius: 16px;
            display: flex; align-items: center; gap: 20px;
            cursor: pointer; transition: 0.3s;
            color: var(--text);
            overflow: hidden;
        }
        .nav-item i { font-size: 1.4rem; min-width: 30px; text-align: center; }
        .nav-item span { opacity: 0; font-weight: 600; white-space: nowrap; }
        aside:hover .nav-item span { opacity: 1; }
        .nav-item:hover { background: rgba(188, 19, 254, 0.15); color: var(--green); }
        .nav-item.active { background: var(--purple); color: #fff; box-shadow: 0 0 20px rgba(188, 19, 254, 0.4); }

        /* --- MAIN AREA --- */
        main { flex: 1; padding: 20px 40px 20px 20px; display: flex; flex-direction: column; overflow-y: auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; margin-bottom: 20px;
        }

        .user-pill {
            background: var(--surface); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 50px; display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(10px);
        }

        /* --- CARDS FLUTUANTES --- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            transition: 0.4s;
            animation: floatIn 0.8s ease-out;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--green); }

        @keyframes floatIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grid-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }

        /* --- UI ELEMENTS --- */
        .neon-text { color: var(--green); text-shadow: 0 0 10px rgba(32, 255, 136, 0.5); }
        
        input, select {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            padding: 15px; border-radius: 15px; color: #fff; margin-top: 10px;
        }
        input:focus { border-color: var(--green); outline: none; }

        .btn-action {
            background: linear-gradient(90deg, var(--purple), #7a00ff);
            color: #fff; border: none; padding: 15px 30px; border-radius: 15px;
            font-weight: 800; cursor: pointer; margin-top: 20px; width: 100%;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-action:hover { box-shadow: 0 0 30px var(--purple); transform: scale(1.02); }

        .terminal {
            background: rgba(0,0,0,0.6); border-radius: 20px; padding: 20px;
            font-family: 'monospace'; font-size: 0.85rem; color: var(--green);
            height: 150px; overflow-y: auto; border: 1px solid var(--border);
        }

        /* --- TABLES --- */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--purple); font-weight: 900; text-transform: uppercase; font-size: 0.75rem; }
        td { padding: 15px; border-bottom: 1px solid rgba(188, 19, 254, 0.1); }

    </style>
</head>
<body>

<aside>
    <div class="logo-box"><i class="fas fa-atom" style="color: #fff; font-size: 1.5rem;"></i></div>
    <div class="nav-item active" onclick="Core.route('dash')"><i class="fas fa-project-diagram"></i> <span>CORE</span></div>
    <div class="nav-item" onclick="Core.route('stock')"><i class="fas fa-biostat"></i> <span>ESTOQUE</span></div>
    <div class="nav-item" onclick="Core.route('fin')"><i class="fas fa-ethereum"></i> <span>FINANCEIRO</span></div>
    <div class="nav-item" onclick="Core.route('eng')"><i class="fas fa-microchip"></i> <span>ENGENHARIA</span></div>
</aside>

<main>
    <header>
        <div>
            <h1 style="font-size: 2.2rem; font-weight: 900; letter-spacing: -1px;">NEBULA <span class="neon-text">OS</span></h1>
            <p style="opacity: 0.6; font-size: 0.9rem;">Reserva Interface | <span id="clock">00:00</span></p>
        </div>
        <div class="user-pill">
            <div style="text-align: right">
                <p style="font-size: 0.8rem; font-weight: 800;">OP_CENTRAL</p>
                <p style="font-size: 0.6rem; color: var(--green);">SISTEMA ESTÁVEL</p>
            </div>
            <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--purple);"></div>
        </div>
    </header>

    <div id="viewport">
        </div>
</main>

<script>
const Core = {
    db: {
        stock: JSON.parse(localStorage.getItem('nebula_stock')) || [],
        finance: JSON.parse(localStorage.getItem('nebula_fin')) || [],
        logs: ["Interface Orbital Iniciada.", "Conectando ao banco de dados..."]
    },

    init() {
        this.route('dash');
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    },

    save() {
        localStorage.setItem('nebula_stock', JSON.stringify(this.db.stock));
        localStorage.setItem('nebula_fin', JSON.stringify(this.db.finance));
    },

    route(page) {
        const vp = document.getElementById('viewport');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        
        switch(page) {
            case 'dash': this.renderDash(vp); break;
            case 'stock': this.renderStock(vp); break;
            case 'fin': this.renderFin(vp); break;
            case 'eng': this.renderEng(vp); break;
        }
    },

    renderDash(el) {
        const saldo = this.db.finance.reduce((acc, cur) => cur.tipo === 'in' ? acc + cur.val : acc - cur.val, 0);
        el.innerHTML = `
            <div class="grid-layout">
                <div class="card">
                    <h3 style="margin-bottom: 20px;">Análise Preditiva AgroGPT</h3>
                    <div class="terminal" id="term"></div>
                    <div style="margin-top: 20px; display: flex; gap: 10px;">
                        <input type="text" id="ai-in" placeholder="Solicitar diagnóstico de talhão...">
                        <button class="btn-action" style="width: 150px; margin: 0;" onclick="Core.askAI()">ANALISAR</button>
                    </div>
                </div>
                <div class="card" style="text-align: center;">
                    <h4 style="opacity: 0.6;">SALDO LÍQUIDO</h4>
                    <h1 class="neon-text" style="font-size: 2.5rem; margin: 15px 0;">R$ ${saldo.toLocaleString()}</h1>
                    <canvas id="miniChart"></canvas>
                </div>
            </div>
        `;
        this.logTerminal("Kernel pronto para processamento.");
        this.initChart();
    },

    renderStock(el) {
        el.innerHTML = `
            <div class="grid-layout">
                <div class="card">
                    <h3>Registrar Insumo</h3>
                    <input type="text" id="s-nome" placeholder="Produto">
                    <input type="number" id="s-qtd" placeholder="Qtd">
                    <button class="btn-action" onclick="Core.addStock()">ADICIONAR AO INVENTÁRIO</button>
                </div>
                <div class="card">
                    <h3>Lista de Materiais</h3>
                    <table>
                        <thead><tr><th>PRODUTO</th><th>QTD</th></tr></thead>
                        <tbody>${this.db.stock.map(s => `<tr><td>${s.name}</td><td class="neon-text">${s.qty}</td></tr>`).join('')}</tbody>
                    </table>
                </div>
            </div>
        `;
    },

    renderFin(el) {
        el.innerHTML = `
            <div class="grid-layout" style="grid-template-columns: 1fr 1fr;">
                <div class="card">
                    <h3>Novo Lançamento</h3>
                    <select id="f-tipo"><option value="in">Receita</option><option value="out">Despesa</option></select>
                    <input type="number" id="f-val" placeholder="Valor R$">
                    <button class="btn-action" onclick="Core.addFin()">EFETUAR TRANSAÇÃO</button>
                </div>
                <div class="card">
                    <h3>Histórico de Fluxo</h3>
                    <div style="max-height: 300px; overflow-y: auto;">
                        <table>
                            <tbody>${this.db.finance.reverse().map(f => `<tr><td>${f.tipo == 'in' ? 'RECEITA' : 'CUSTO'}</td><td style="color:${f.tipo == 'in' ? 'var(--green)' : '#ff4757'}">R$ ${f.val}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
    },

    renderEng(el) {
        el.innerHTML = `
            <div class="card" style="max-width: 600px; margin: auto;">
                <h3 class="neon-text">Cálculo de Pulverização Profissional</h3>
                <p style="font-size: 0.8rem; margin: 10px 0 20px 0; opacity: 0.7;">Calibração de vazão de bico (L/min)</p>
                <label>Velocidade (km/h)</label><input type="number" id="e-vel" value="8">
                <label>Taxa Desejada (L/ha)</label><input type="number" id="e-tax" value="100">
                <label>Espaçamento Bicos (m)</label><input type="number" id="e-esp" value="0.5">
                <button class="btn-action" onclick="Core.calcEng()">PROCESSAR ENGENHARIA</button>
                <div id="res-eng" class="card" style="margin-top: 30px; display:none; border-color: var(--green);">
                    <h2 id="res-val" class="neon-text" style="text-align: center;">0.00 L/min</h2>
                </div>
            </div>
        `;
    },

    addStock() {
        const name = document.getElementById('s-nome').value;
        const qty = document.getElementById('s-qtd').value;
        if(name && qty) {
            this.db.stock.push({name, qty});
            this.save(); this.route('stock');
        }
    },

    addFin() {
        const tipo = document.getElementById('f-tipo').value;
        const val = parseFloat(document.getElementById('f-val').value);
        if(val) {
            this.db.finance.push({tipo, val});
            this.save(); this.route('fin');
        }
    },

    calcEng() {
        const vel = document.getElementById('e-vel').value;
        const tax = document.getElementById('e-tax').value;
        const esp = document.getElementById('e-esp').value;
        const res = (tax * vel * esp) / 600;
        document.getElementById('res-eng').style.display = 'block';
        document.getElementById('res-val').innerText = res.toFixed(2) + " L/min";
    },

    askAI() {
        const txt = document.getElementById('ai-in').value;
        if(!txt) return;
        this.logTerminal(`> Analisando comando: ${txt}`);
        setTimeout(() => this.logTerminal(`> AgroGPT: Com base nos sensores de Reserva, o solo apresenta saturação de 42%. Aumentar irrigação em 15% nas próximas 4 horas.`), 800);
        document.getElementById('ai-in').value = '';
    },

    logTerminal(m) {
        const t = document.getElementById('term');
        if(t) {
            t.innerHTML += `<p style="margin-bottom:5px;">[${new Date().toLocaleTimeString()}] ${m}</p>`;
            t.scrollTop = t.scrollHeight;
        }
    },

    initChart() {
        const ctx = document.getElementById('miniChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1', '2', '3', '4', '5'],
                datasets: [{
                    data: [10, 25, 15, 35, 30],
                    borderColor: '#20ff88',
                    tension: 0.4,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(32, 255, 136, 0.05)'
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }
};

window.onload = () => Core.init();
</script>
</body>
</html>
