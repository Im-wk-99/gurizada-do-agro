<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroOS | Enterprise Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-card: #161b22;
            --primary: #238636;
            --accent: #2ea043;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --danger: #da3633;
            --warning: #d29922;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-deep); color: var(--text-main); line-height: 1.6; }

        /* --- DASHBOARD LAYOUT --- */
        .wrapper { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

        sidebar {
            background: var(--bg-card);
            border-right: 1px solid #30363d;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo-area { font-size: 1.2rem; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 10px; }

        .nav-link {
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-dim);
            display: flex; align-items: center; gap: 10px;
        }

        .nav-link:hover, .nav-link.active { background: #21262d; color: white; }

        /* --- MAIN CONTENT --- */
        main { padding: 30px; overflow-y: auto; }

        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }

        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 10px; border: 1px solid #30363d; }
        .stat-card small { color: var(--text-dim); text-transform: uppercase; font-size: 0.7rem; }
        .stat-card h3 { font-size: 1.8rem; margin: 5px 0; color: white; }

        .module-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }

        .card { background: var(--bg-card); border-radius: 12px; border: 1px solid #30363d; overflow: hidden; }
        .card-header { padding: 15px 20px; background: #21262d; border-bottom: 1px solid #30363d; font-weight: bold; display: flex; justify-content: space-between; }

        .card-body { padding: 20px; }

        /* --- FORMULÁRIOS COMPLEXOS --- */
        .field-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; }
        input, select {
            width: 100%; padding: 10px; background: var(--bg-deep); border: 1px solid #30363d; 
            border-radius: 6px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(46, 160, 67, 0.2); }

        .btn-action {
            background: var(--primary); color: white; border: none; padding: 12px; 
            border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%;
        }

        /* --- LISTAS DINÂMICAS --- */
        .data-list { margin-top: 15px; }
        .data-item { 
            background: #0d1117; padding: 10px; border-radius: 6px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--accent);
        }

        @media (max-width: 1000px) { .wrapper { grid-template-columns: 1fr; } sidebar { display: none; } .module-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="wrapper">
        <sidebar>
            <div class="logo-area"><i class="fas fa-tractor"></i> AGRO-OS PRO</div>
            <div class="nav-link active"><i class="fas fa-chart-line"></i> Dashboard</div>
            <div class="nav-link"><i class="fas fa-box"></i> Inventário</div>
            <div class="nav-link"><i class="fas fa-map-marked-alt"></i> Talhões</div>
            <div class="nav-link"><i class="fas fa-cogs"></i> Maquinário</div>
            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #30363d;">
                <small>Status do Banco: <span id="db-status" style="color: var(--accent);">ONLINE</span></small>
            </div>
        </sidebar>

        <main>
            <div class="stats-bar">
                <div class="stat-card">
                    <small>Área Total Monitorada</small>
                    <h3 id="stat-area">1.250 ha</h3>
                </div>
                <div class="stat-card">
                    <small>Previsão de Colheita</small>
                    <h3 id="stat-yield">--</h3>
                </div>
                <div class="stat-card" style="border-top: 4px solid var(--warning);">
                    <small>Alertas de Manutenção</small>
                    <h3 id="stat-alerts">2 Ativos</h3>
                </div>
            </div>

            <div class="module-grid">
                <div class="card">
                    <div class="card-header">
                        <span>ORDENS DE SERVIÇO</span>
                        <i class="fas fa-plus" style="cursor: pointer;" onclick="toggleForm('form-os')"></i>
                    </div>
                    <div class="card-body">
                        <div id="form-os">
                            <div class="field-group">
                                <label>Atividade</label>
                                <input type="text" id="os-task" placeholder="Ex: Pulverização Talhão 5">
                            </div>
                            <div class="field-group">
                                <label>Operador</label>
                                <select id="os-user">
                                    <option>João Silveira</option>
                                    <option>Marcos Trecho</option>
                                    <option>Ricardo Soja</option>
                                </select>
                            </div>
                            <button class="btn-action" onclick="AgroEngine.saveOS()">Lançar Operação</button>
                        </div>
                        <div class="data-list" id="list-os"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">INVENTÁRIO DE INSUMOS</div>
                    <div class="card-body">
                        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                            <input type="text" id="insumo-nome" placeholder="Produto">
                            <input type="number" id="insumo-qtd" placeholder="Qtd (L/Kg)" style="width: 100px;">
                            <button class="btn-action" style="width: 50px;" onclick="AgroEngine.saveInsumo()">+</button>
                        </div>
                        <div id="list-insumos"></div>
                    </div>
                </div>

                <div class="card" style="grid-column: span 2;">
                    <div class="card-header">ENGENHARIA: CÁLCULO DE APLICAÇÃO</div>
                    <div class="card-body" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                        <div class="field-group">
                            <label>Velocidade (km/h)</label>
                            <input type="number" id="calc-vel" value="8">
                        </div>
                        <div class="field-group">
                            <label>Largura Barra (m)</label>
                            <input type="number" id="calc-larg" value="24">
                        </div>
                        <div class="field-group">
                            <label>Vazão Bicos (L/min)</label>
                            <input type="number" id="calc-vaz" value="1.2">
                        </div>
                        <div style="grid-column: span 3; background: #0d1117; padding: 15px; border-radius: 8px;">
                            <p style="color: var(--accent); font-weight: bold;">Resultado: <span id="calc-res">--</span> L/ha</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        /**
         * AGRO-ENGINE: O Cérebro do Sistema
         */
        const AgroEngine = {
            data: {
                os: JSON.parse(localStorage.getItem('agro_os')) || [],
                insumos: JSON.parse(localStorage.getItem('agro_insumos')) || []
            },

            init() {
                this.render();
                this.setupCalculators();
                console.log("Sistema Inicializado com Sucesso.");
            },

            saveOS() {
                const task = document.getElementById('os-task').value;
                const user = document.getElementById('os-user').value;
                if(!task) return alert("Descreva a operação!");

                const newOS = { id: Date.now(), task, user, status: 'Ativo' };
                this.data.os.push(newOS);
                localStorage.setItem('agro_os', JSON.stringify(this.data.os));
                this.render();
                document.getElementById('os-task').value = "";
            },

            saveInsumo() {
                const nome = document.getElementById('insumo-nome').value;
                const qtd = document.getElementById('insumo-qtd').value;
                if(!nome || !qtd) return;

                this.data.insumos.push({ nome, qtd });
                localStorage.setItem('agro_insumos', JSON.stringify(this.data.insumos));
                this.render();
                document.getElementById('insumo-nome').value = "";
                document.getElementById('insumo-qtd').value = "";
            },

            deleteItem(id, type) {
                this.data[type] = this.data[type].filter(item => item.id !== id);
                localStorage.setItem(`agro_${type}`, JSON.stringify(this.data[type]));
                this.render();
            },

            setupCalculators() {
                const inputs = ['calc-vel', 'calc-larg', 'calc-vaz'];
                inputs.forEach(id => {
                    document.getElementById(id).addEventListener('input', () => {
                        const v = parseFloat(document.getElementById('calc-vel').value);
                        const l = parseFloat(document.getElementById('calc-larg').value);
                        const q = parseFloat(document.getElementById('calc-vaz').value);
                        // Fórmula Agro: L/ha = (600 * Q) / (V * L)
                        const res = (600 * q) / (v * l);
                        document.getElementById('calc-res').innerText = res.toFixed(2);
                    });
                });
            },

            render() {
                // Renderizar OS
                const listOS = document.getElementById('list-os');
                listOS.innerHTML = this.data.os.map(item => `
                    <div class="data-item">
                        <div>
                            <strong>${item.task}</strong><br>
                            <small>${item.user}</small>
                        </div>
                        <button onclick="AgroEngine.deleteItem(${item.id}, 'os')" style="color:var(--danger); background:none; border:none; cursor:pointer;">Finalizar</button>
                    </div>
                `).join('');

                // Renderizar Insumos
                const listInsumos = document.getElementById('list-insumos');
                listInsumos.innerHTML = this.data.insumos.map(item => `
                    <div class="data-item" style="border-left-color: var(--warning)">
                        <span>${item.nome}</span>
                        <span><strong>${item.qtd} UN</strong></span>
                    </div>
                `).join('');
            }
        };

        // Inicialização
        AgroEngine.init();

        function toggleForm(id) {
            const f = document.getElementById(id);
            f.style.display = f.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
