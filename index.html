<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Gurizada do Agro</title>
    <style>
        /* CONFIGURAÇÕES DE CORES */
        :root {
            --primary: #2d5a27;      /* Verde Safra */
            --accent: #f8961e;       /* Laranja Colheita */
            --bg: #f0f2f0;           /* Fundo Claro */
            --text: #1b1b1b;
            --card-bg: #ffffff;
            --header-bg: #1b1b1b;
        }

        /* ESTILO MODO NOTURNO */
        .dark-mode {
            --bg: #121212;
            --text: #e0e0e0;
            --card-bg: #1e1e1e;
            --header-bg: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            transition: background 0.3s ease;
            padding-bottom: 50px;
        }

        /* CABEÇALHO */
        header {
            background: var(--header-bg);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--accent);
        }

        /* CONTAINER PRINCIPAL */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* CARDS */
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            border-top: 4px solid var(--primary);
        }

        h2 { margin-bottom: 15px; font-size: 1.2rem; text-transform: uppercase; }

        /* CONTADOR */
        .stats-container {
            display: flex;
            align-items: center;
            justify-content: space-around;
            text-align: center;
        }

        .stats-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            display: block;
        }

        /* INPUTS E BOTÕES */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            background: var(--card-bg);
            color: var(--text);
        }

        input:focus { border-color: var(--primary); }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-theme {
            background: var(--accent);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        /* LISTA DE TAREFAS */
        ul { list-style: none; }
        li {
            background: rgba(45, 90, 39, 0.05);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
            animation: slideIn 0.3s ease;
        }

        .btn-done {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🚜 GURIZADA DO AGRO</div>
        <button class="btn-theme" onclick="toggleDarkMode()">MODO ESCURO</button>
    </header>

    <div class="container">
        
        <div class="card">
            <h2>Previsão de Colheita</h2>
            <div class="stats-container">
                <div>
                    <span class="stats-number" id="dias-count">114</span>
                    <p>Dias Restantes</p>
                </div>
                <div style="border-left: 1px solid #ddd; padding-left: 20px;">
                    <span class="stats-number">98%</span>
                    <p>Eficiência da Frota</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Caderno de Campo Digital</h2>
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Nova tarefa (ex: Revisar plantadeira)...">
                <button class="btn-add" onclick="addTask()">SALVAR</button>
            </div>
            <ul id="taskList">
                </ul>
        </div>

    </div>

    <script>
        // Função para Alternar Modo Escuro
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.btn-theme');
            if(document.body.classList.contains('dark-mode')) {
                btn.innerText = "MODO CLARO";
            } else {
                btn.innerText = "MODO ESCURO";
            }
        }

        // Função para Adicionar Tarefas
        function addTask() {
            const input = document.getElementById('taskInput');
            const list = document.getElementById('taskList');

            if (input.value.trim() === '') {
                alert("Digite uma tarefa, moçada!");
                return;
            }

            const li = document.createElement('li');
            li.innerHTML = `
                <span>${input.value}</span>
                <button class="btn-done" onclick="removeTask(this)">OK</button>
            `;
            
            list.appendChild(li);
            input.value = ''; // Limpa o campo
        }

        // Função para Remover Tarefa
        function removeTask(button) {
            const item = button.parentElement;
            item.style.opacity = '0';
            setTimeout(() => item.remove(), 300);
        }

        // Evento para apertar 'Enter' no input
        document.getElementById('taskInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addTask();
        });
    </script>

</body>
</html>
