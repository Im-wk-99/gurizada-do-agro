<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroOS Enterprise | Gestão 360°</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #0a0c10;
            --bg-side: #12151c;
            --bg-card: #1c2128;
            --primary: #2ebc59;
            --primary-hover: #36d367;
            --accent: #58a6ff;
            --danger: #f85149;
            --warning: #d29922;
            --text-main: #adbac7;
            --text-bright: #ffffff;
            --border: #30363d;
        }

        /* Layout Base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Profissional */
        aside { 
            width: 280px; background: var(--bg-side); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; transition: 0.3s;
        }
        .logo-area { padding: 30px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); }
        .logo-area i { color: var(--primary); font-size: 2rem; }
        .logo-area h1 { font-size: 1.4rem; color: var(--text-bright); font-weight: 800; letter-spacing: -1px; }

        .nav-menu { flex: 1; padding: 20px 0; overflow-y: auto; }
        .nav-link { 
            display: flex; align-items: center; gap: 15px; padding: 12px 30px;
            color: var(--text-main); text-decoration: none; cursor: pointer;
            transition: 0.2s; border-right: 4px solid transparent;
        }
        .nav-link:hover, .nav-link.active { 
            background: rgba(46, 188, 89, 0.1); color: var(--primary); border-right-color: var(--primary);
        }

        /* Main Content */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { 
            height: 70px; background: var(--bg-side); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
        }

        #viewport { flex: 1; padding: 30px; overflow-y: auto; scroll-behavior: smooth; }

        /* Componentes de UI */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .agro-card { 
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
            padding: 25px; position: relative; transition: 0.3s;
        }
        .agro-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--text-bright); margin: 10px 0; }
        .trend-up { color: var(--primary); font-size: 0.8rem; }

        /* Botões e Inputs */
        .btn { 
            padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600;
            cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }

        /* Módulo Fleet - Telemetria */
        .machine-card { display: flex; align-items: center; gap: 20px; padding: 15px; background: #22272e; border-radius: 10px; margin-bottom: 15px; }
        .fuel-track { flex: 1; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .fuel-fill { height: 100%; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Animações */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .view-animate { animation: fadeIn 0.4s ease-out; }

    </style>
</head>
<body>

    <aside>
        <div class="logo-area">
            <i class="fas fa-tractor"></i>
            <h1>AGRO OS PRO</h1>
        </div>
        <div class="nav-menu">
            <div class="nav-link active" onclick="Router.go('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
            <div class="nav-link" onclick="Router.go('fleet')"><i class="fas fa-truck-monster"></i> Telemetria</div>
            <div class="nav-link" onclick="Router.go('finance')"><i class="fas fa-file-invoice-dollar"></i> Financeiro</div>
            <div class="nav-link" onclick="Router.go('inventory')"><i class="fas fa-seedling"></i> Insumos</div>
            <div class="nav-link" onclick="Router.go('weather')"><i class="fas fa-cloud-sun-rain"></i> Clima & Solo</div>
        </div>
        <div style="padding: 20px; border-top: 1px solid var(--border);">
            <div style="font-size: 0.75rem; color: var(--warning);"><i class="fas fa-sync"></i> Sincronizado: Nuvem</div>
        </div>
    </aside>

    <main>
        <header>
            <div id="breadcrumb">Início / Dashboard</div>
            <div style="display: flex; gap: 20px; align-items: center;">
                <span id="sys-time">00:00:00</span>
                <img src="https://ui-avatars.com/api/?name=Admin+Agro&background=2ebc59&color=fff" style="width: 35px; border-radius: 50%;">
            </div>
        </header>

        <div id="viewport">
            </div>
    </main>

<script>
/**
 * AGRO OS ENTERPRISE ENGINE
 * Desenvolvido para alta performance no campo.
 */

const AppState = {
    fleet: [
        { id: 1, name: "Case Magnum 340", fuel: 82, status: "Operando", cost_h: 150 },
        { id: 2, name: "John Deere 8R", fuel: 18, status: "Reserva", cost_h: 180 },
        { id: 3, name: "New Holland T9", fuel: 55, status: "Manutenção", cost_h: 210 }
    ],
    inventory: JSON.parse(localStorage.getItem('agro_inv')) || [],
    finance: { total_invested: 1250000, projected_revenue: 3800000 }
};

const Router = {
    go(view) {
        const viewport = document.getElementById('viewport');
        viewport.innerHTML = `<div class="view-animate">Carregando módulo...</div>`;
        
        // Simulação de delay de processamento
        setTimeout(() => {
            switch(view) {
                case 'dashboard': this.renderDashboard(); break;
                case 'fleet': this.renderFleet(); break;
                default: this.renderPlaceholder(view);
            }
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('breadcrumb').innerText = `AgroOS / ${view.charAt(0).toUpperCase() + view.slice(1)}`;
        }, 300);
    },

    renderDashboard() {
        const viewport = document.getElementById('viewport');
        viewport.innerHTML = `
            <div class="view-animate">
                <div class="grid">
                    <div class="agro-card">
                        <span>Capex Safra 24/25</span>
                        <div class="stat-value">R$ 1.25M</div>
                        <span class="trend-up"><i class="fas fa-arrow-up"></i> 12% vs ano ant.</span>
                    </div>
                    <div class="agro-card">
                        <span>Hectares Monitorados</span>
                        <div class="stat-value">4.250 ha</div>
                        <span>Status: Plantio 85%</span>
                    </div>
                    <div class="agro-card">
                        <span>Janela Climática</span>
                        <div class="stat-value">Ótima</div>
                        <span style="color: var(--primary)">Chuva prevista: 15mm</span>
                    </div>
                </div>
                
                <div class="grid" style="margin-top: 30px; grid-template-columns: 2fr 1fr;">
                    <div class="agro-card">
                        <h3>Performance de Produção (Estimada vs Real)</h3>
                        <canvas id="performanceChart" style="height: 300px;"></canvas>
                    </div>
                    <div class="agro-card">
                        <h3>Alertas Críticos</h3>
                        <div style="margin-top: 15px;">
                            <div style="color: var(--danger); margin-bottom: 10px;"><i class="fas fa-exclamation-triangle"></i> Combustível Baixo: JD 8R</div>
                            <div style="color: var(--warning);"><i class="fas fa-tools"></i> Revisão Case Magnum: 12h</div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        this.initDashboardCharts();
    },

    renderFleet() {
        const viewport = document.getElementById('viewport');
        const machineHtml = AppState.fleet.map(m => `
            <div class="machine-card">
                <i class="fas fa-tractor" style="font-size: 1.5rem;"></i>
                <div style="flex: 1;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <b style="color: #fff">${m.name}</b>
                        <span>${m.fuel}%</span>
                    </div>
                    <div class="fuel-track">
                        <div class="fuel-fill" style="width: ${m.fuel}%; background: ${m.fuel < 20 ? 'var(--danger)' : 'var(--primary)'}"></div>
                    </div>
                </div>
                <div style="width: 120px; text-align: right;">
                    <span style="font-size: 0.8rem; color: ${m.status === 'Operando' ? 'var(--primary)' : 'var(--warning)'}">${m.status}</span>
                </div>
            </div>
        `).join('');

        viewport.innerHTML = `
            <div class="view-animate">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h2>Gestão de Frota e Telemetria</h2>
                    <button class="btn btn-primary"><i class="fas fa-plus"></i> Adicionar Máquina</button>
                </div>
                <div class="grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="agro-card">
                        <h3>Status das Unidades</h3>
                        <div style="margin-top: 20px;">${machineHtml}</div>
                    </div>
                    <div class="agro-card">
                        <h3>Consumo de Diesel (7 dias)</h3>
                        <canvas id="fuelChart"></canvas>
                    </div>
                </div>
            </div>
        `;
        this.initFleetCharts();
    },

    renderPlaceholder(view) {
        document.getElementById('viewport').innerHTML = `<h2>Módulo ${view} em desenvolvimento...</h2>`;
    },

    initDashboardCharts() {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Soja', 'Milho', 'Trigo', 'Algodão'],
                datasets: [{
                    label: 'Produtividade (Sc/ha)',
                    data: [65, 140, 55, 280],
                    backgroundColor: '#2ebc59'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    },

    initFleetCharts() {
        const ctx = document.getElementById('fuelChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab', 'Dom'],
                datasets: [{
                    label: 'Litros consumidos',
                    data: [450, 520, 380, 600, 550, 200, 50],
                    borderColor: '#58a6ff',
                    tension: 0.4
                }]
            }
        });
    }
};

// Utilitários
function updateTime() {
    document.getElementById('sys-time').innerText = new Date().toLocaleTimeString();
}

// Startup
window.onload = () => {
    Router.go('dashboard');
    setInterval(updateTime, 1000);
};

</script>
</body>
</html>
