<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroOS Pro | Gestão Inteligente de Safra</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #2ebc59;
            --primary-dark: #1e7e3a;
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --text-white: #ffffff;
            --danger: #f85149;
            --warning: #d29922;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Navegação */
        aside { 
            width: 280px; background: var(--bg-card); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; 
        }
        .sidebar-header { padding: 30px; border-bottom: 1px solid var(--border); text-align: center; }
        .sidebar-header h1 { color: var(--primary); font-size: 1.5rem; font-weight: 800; }

        .nav-link { 
            padding: 15px 30px; display: flex; align-items: center; gap: 15px;
            text-decoration: none; color: var(--text-main); cursor: pointer; transition: 0.2s;
        }
        .nav-link:hover, .nav-link.active { background: #21262d; color: var(--primary); border-left: 4px solid var(--primary); }

        /* Área de Conteúdo */
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-bar { 
            padding: 20px 40px; background: var(--bg-card); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .container { padding: 30px; max-width: 1200px; margin: 0 auto; width: 100%; }

        /* Widgets e Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .card-title { font-size: 0.9rem; font-weight: 600; color: var(--text-main); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        /* Formulários e Botões */
        input, select, textarea { 
            width: 100%; padding: 12px; background: var(--bg-dark); border: 1px solid var(--border);
            border-radius: 8px; color: white; margin-bottom: 15px; outline: none;
        }
        .btn { 
            padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; 
            cursor: pointer; transition: 0.3s; width: 100%;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }

        /* Instruções */
        .instruction-box { background: rgba(46, 188, 89, 0.1); border-left: 4px solid var(--primary); padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        
        /* Clima */
        .weather-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .weather-btn { flex: 1; padding: 10px; background: #21262d; border: 1px solid var(--border); border-radius: 8px; color: white; cursor: pointer; text-align: center; }
        .weather-btn.active { border-color: var(--primary); background: rgba(46, 188, 89, 0.2); }

        /* Responsividade */
        @media (max-width: 768px) { aside { display: none; } }
    </style>
</head>
<body>

<aside>
    <div class="sidebar-header">
        <h1>AGRO-OS <span style="color:white">PRO</span></h1>
    </div>
    <div class="nav-menu">
        <div class="nav-link active" onclick="App.view('dash')"><i class="fas fa-chart-line"></i> Dashboard</div>
        <div class="nav-link" onclick="App.view('plantio')"><i class="fas fa-seedling"></i> Plantio & Clima</div>
        <div class="nav-link" onclick="App.view('frota')"><i class="fas fa-tractor"></i> Frota & Telemetria</div>
        <div class="nav-link" onclick="App.view('estoque')"><i class="fas fa-warehouse"></i> Estoque Insumos</div>
    </div>
</aside>

<main>
    <div class="top-bar">
        <div id="view-title">Dashboard Operacional</div>
        <div id="sys-clock">00:00:00</div>
    </div>

    <div class="container" id="app-content">
        </div>
</main>

<script>
/** * AGRO-OS PRO CORE ENGINE
 * Gerencia visualizações, cálculos e clima.
 */

const App = {
    state: {
        currentView: 'dash',
        weather: 'Limpo',
        temp: 28,
        data: JSON.parse(localStorage.getItem('agro_pro_db')) || { tasks: [], inventory: [] }
    },

    init() {
        this.updateClock();
        setInterval(() => this.updateClock(), 1000);
        this.render();
    },

    updateClock() {
        document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString();
    },

    view(v) {
        this.state.currentView = v;
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        this.render();
    },

    // --- MÓDULO DE CLIMA ---
    setWeather(type, temp) {
        this.state.weather = type;
        this.state.temp = temp;
        this.render();
    },

    // --- RENDERIZAÇÃO DE TELAS ---
    render() {
        const content = document.getElementById('app-content');
        const title = document.getElementById('view-title');

        if (this.state.currentView === 'dash') {
            title.innerText = "Dashboard Geral";
            content.innerHTML = `
                <div class="instruction-box">
                    <strong><i class="fas fa-info-circle"></i> Instruções:</strong> 
                    Bem-vindo ao AgroOS Pro. Aqui você monitora a saúde financeira e operacional da fazenda. 
                    Mantenha o diesel acima de 20% para evitar paradas críticas.
                </div>
                <div class="grid">
                    <div class="card">
                        <div class="card-title">PRODUTIVIDADE ESTIMADA</div>
                        <canvas id="prodChart"></canvas>
                    </div>
                    <div class="card">
                        <div class="card-title">CUSTO POR HECTARE</div>
                        <h2 style="font-size: 2.5rem; color: var(--primary);">R$ 3.450</h2>
                        <p style="color: var(--warning);">Acima da média: +5.2%</p>
                    </div>
                </div>
            `;
            this.initCharts();
        }

        if (this.state.currentView === 'plantio') {
            title.innerText = "Monitoramento de Plantio & Clima";
            content.innerHTML = `
                <div class="instruction-box">
                    <strong>Guia de Plantio:</strong> A janela ideal para soja é com umidade do solo entre 50-70%. 
                    Verifique a previsão antes de liberar os tratores.
                </div>
                <div class="grid">
                    <div class="card">
                        <div class="card-title">SELEÇÃO DE CLIMA (SIMULAÇÃO)</div>
                        <div class="weather-selector">
                            <button class="weather-btn ${this.state.weather === 'Limpo' ? 'active' : ''}" onclick="App.setWeather('Limpo', 31)">Ensolarado</button>
                            <button class="weather-btn ${this.weather === 'Chuva' ? 'active' : ''}" onclick="App.setWeather('Chuva', 22)">Chuva</button>
                            <button class="weather-btn" onclick="App.setWeather('Nublado', 25)">Nublado</button>
                        </div>
                        <div style="text-align: center; padding: 20px;">
                            <i class="fas ${this.state.weather === 'Limpo' ? 'fa-sun' : 'fa-cloud-rain'} fa-4x" style="color: var(--warning);"></i>
                            <h2 style="margin-top: 10px;">${this.state.temp}°C - ${this.state.weather}</h2>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">CONDIÇÃO DO SOLO</div>
                        <p>Umidade: 62% (Ideal)</p>
                        <p>PH: 6.2</p>
                        <hr style="margin: 10px 0; border: 0; border-top: 1px solid var(--border);">
                        <button class="btn btn-primary">REGISTRAR ANALISE</button>
                    </div>
                </div>
            `;
        }

        if (this.state.currentView === 'frota') {
            title.innerText = "Frota & Máquinas";
            content.innerHTML = `
                <div class="grid">
                    <div class="card">
                        <div class="card-title">JOHN DEERE 8R 370</div>
                        <div style="background: #333; height: 10px; border-radius: 5px;">
                            <div style="width: 75%; background: var(--primary); height: 100%; border-radius: 5px;"></div>
                        </div>
                        <p style="margin-top: 10px;">Diesel: 75% | Status: Operando</p>
                    </div>
                    <div class="card">
                        <div class="card-title">CASE MAGNUM 340</div>
                        <div style="background: #333; height: 10px; border-radius: 5px;">
                            <div style="width: 15%; background: var(--danger); height: 100%; border-radius: 5px;"></div>
                        </div>
                        <p style="margin-top: 10px;">Diesel: 15% | <span style="color: var(--danger);">Abastecer Agora!</span></p>
                    </div>
                </div>
            `;
        }
    },

    initCharts() {
        const ctx = document.getElementById('prodChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Safra 21', 'Safra 22', 'Safra 23', 'Safra 24'],
                datasets: [{
                    label: 'Sacas/ha',
                    data: [62, 68, 65, 72],
                    borderColor: '#2ebc59',
                    backgroundColor: 'rgba(46, 188, 89, 0.2)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }
};

App.init();
</script>
</body>
</html>
