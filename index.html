<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula OS v4.0 | Fully Functional</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@200;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* DESIGN SYSTEM CORE */
        :root {
            --neon-p: #bc13fe; --neon-g: #20ff88; --neon-b: #00d2ff;
            --danger: #ff4757; --warning: #ffa502; --bg-deep: #020205;
            --glass: rgba(12, 10, 20, 0.85); --border: rgba(188, 19, 254, 0.3);
            --font-head: 'Orbitron', sans-serif; --font-body: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { background: var(--bg-deep); color: #e0e0e0; font-family: var(--font-body); height: 100vh; overflow: hidden; }

        /* TELA DE ENTRADA (SPLASH) */
        #splash-screen {
            position: fixed; inset: 0; z-index: 10000;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }
        #splash-screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.5) translateY(-100px); }

        .btn-simulate {
            padding: 25px 60px; font-family: var(--font-head); font-size: 1.2rem;
            color: var(--neon-g); background: transparent; border: 2px solid var(--neon-g);
            border-radius: 50px; cursor: pointer; transition: 0.4s; z-index: 10;
            letter-spacing: 5px; box-shadow: 0 0 20px rgba(32, 255, 136, 0.2);
        }
        .btn-simulate:hover { background: var(--neon-g); color: #000; box-shadow: 0 0 50px var(--neon-g); }

        /* INTERFACE DO APP */
        #app-interface { display: flex; height: 100vh; width: 100vw; opacity: 0; transition: 2s ease; visibility: hidden; }
        #app-interface.visible { opacity: 1; visibility: visible; }

        #nebula-canvas { position: fixed; inset: 0; z-index: -5; background-size: cover; background-position: center; filter: brightness(0.15) blur(3px); }
        .grid-mask { position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.1; z-index: -4; pointer-events: none; }

        /* SIDEBAR DINÂMICA */
        aside { 
            width: 100px; background: var(--glass); backdrop-filter: blur(40px); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 40px 0; transition: 0.6s ease; z-index: 100;
        }
        aside:hover { width: 280px; }

        .logo-core { width: 60px; height: 60px; background: var(--neon-p); border-radius: 18px; display: grid; place-items: center; margin-bottom: 50px; cursor: pointer; box-shadow: 0 0 20px var(--neon-p); }

        .nav-link { 
            width: 85%; padding: 18px; margin: 10px 0; border-radius: 20px; display: flex; align-items: center;
            gap: 20px; cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.3); overflow: hidden;
        }
        .nav-link i { font-size: 1.5rem; min-width: 45px; text-align: center; }
        .nav-link span { font-family: var(--font-head); font-size: 0.8rem; opacity: 0; }
        aside:hover .nav-link span { opacity: 1; }
        .nav-link.active { border-left: 4px solid var(--neon-p); color: var(--neon-g); background: rgba(188, 19, 254, 0.1); }

        /* CONTEÚDO */
        main { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .card-nebula { background: var(--glass); border: 1px solid var(--border); border-radius: 35px; padding: 35px; backdrop-filter: blur(30px); margin-bottom: 30px; animation: slideUp 0.6s ease-out; }
        
        .neon-txt { color: var(--neon-p); text-shadow: 0 0 15px var(--neon-p); }
        .nebula-input { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid var(--border); padding: 18px; border-radius: 15px; color: #fff; margin-bottom: 15px; outline: none; font-family: var(--font-body); }
        .btn-nebula { width: 100%; background: linear-gradient(135deg, var(--neon-p), #7a00ff); border: none; padding: 20px; border-radius: 15px; color: #fff; font-family: var(--font-head); font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-nebula:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(188, 19, 254, 0.5); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .report-item { background: rgba(255, 71, 87, 0.05); border: 1px solid rgba(255, 71, 87, 0.2); border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--danger); position: relative; }
        .btn-delete { position: absolute; right: 15px; top: 15px; color: var(--danger); cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .btn-delete:hover { opacity: 1; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div style="text-align: center; z-index: 10;">
            <i class="fas fa-atom" style="font-size: 5rem; color: var(--neon-p); margin-bottom: 20px; animation: pulse 2s infinite alternate;"></i>
            <h1 style="font-family: 'Orbitron'; letter-spacing: 15px; font-size: 3rem;">NEBULA OS</h1>
            <p style="opacity: 0.5; letter-spacing: 5px; margin-bottom: 50px;">RESERVA - PARANÁ | BRAZIL</p>
            <button class="btn-simulate" onclick="App.init()">INICIAR SISTEMA</button>
        </div>
    </div>

    <div id="app-interface">
        <div id="nebula-canvas"></div>
        <div class="grid-mask"></div>

        <aside>
            <div class="logo-core" onclick="location.reload()"><i class="fas fa-atom"></i></div>
            <nav id="nav-container"></nav>
        </aside>

        <main>
            <header style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 40px;">
                <div>
                    <h2 style="font-family: 'Orbitron'; margin: 0;">SISTEMA <span class="neon-txt">ACTIVE</span></h2>
                    <p id="view-title" style="font-size: 0.7rem; opacity: 0.5; text-transform: uppercase;">ROOT // DASHBOARD</p>
                </div>
                <div style="text-align: right; font-family: 'Orbitron';">
                    <div id="clock" style="color: var(--neon-g); font-size: 1.3rem;">00:00:00</div>
                    <div style="font-size: 0.6rem; color: var(--neon-b);">SATELLITE SYNC: 100%</div>
                </div>
            </header>

            <div id="content-area"></div>
        </main>
    </div>

    <script>
        const App = {
            state: {
                view: 'dash',
                reports: JSON.parse(localStorage.getItem('neb_data')) || [],
                backgrounds: {
                    dash: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1600',
                    calc: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=1600',
                    diff: 'https://images.unsplash.com/photo-1504148455328-c376907d081c?auto=format&fit=crop&w=1600',
                    help: 'https://images.unsplash.com/photo-1454165833767-027ffec95c1c?auto=format&fit=crop&w=1600'
                }
            },

            init() {
                document.getElementById('splash-screen').classList.add('hidden');
                document.getElementById('app-interface').classList.add('visible');
                
                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
                this.renderNav();
                this.navigate('dash');
            },

            updateClock() {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
            },

            navigate(view) {
                this.state.view = view;
                document.getElementById('nebula-canvas').style.backgroundImage = `url('${this.state.backgrounds[view]}')`;
                document.getElementById('view-title').innerText = `ROOT // ${view.toUpperCase()}`;
                this.renderNav();
                this.renderContent();
            },

            renderNav() {
                const navs = [
                    { id: 'dash', icon: 'fa-chart-pie', label: 'DASHBOARD' },
                    { id: 'calc', icon: 'fa-calculator', label: 'CALC. SAFRA' },
                    { id: 'diff', icon: 'fa-exclamation-circle', label: 'DIFICULDADES' },
                    { id: 'help', icon: 'fa-life-ring', label: 'AJUDA' }
                ];
                document.getElementById('nav-container').innerHTML = navs.map(n => `
                    <div class="nav-link ${this.state.view === n.id ? 'active' : ''}" onclick="App.navigate('${n.id}')">
                        <i class="fas ${n.icon}"></i><span>${n.label}</span>
                    </div>
                `).join('');
            },

            renderContent() {
                const container = document.getElementById('content-area');
                
                if (this.state.view === 'dash') {
                    container.innerHTML = `
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
                            <div class="card-nebula">
                                <h3 class="neon-txt">STATUS DA OPERAÇÃO</h3>
                                <p style="margin-top:15px;">Monitoramento em tempo real ativado para a região de Reserva, PR.</p>
                                <div style="margin-top:25px; padding:20px; background:rgba(255,255,255,0.05); border-radius:20px;">
                                    <small>TEMPERATURA SOLO</small><h3>22.8°C</h3><br>
                                    <small>ESTADO DA SAFRA</small><h3 style="color:var(--neon-g)">DESENVOLVIMENTO ÓTIMO</h3>
                                </div>
                            </div>
                            <div class="card-nebula" style="text-align:center;">
                                <small>TOTAL DE REGISTROS DE CAMPO</small>
                                <h1 style="font-size:5rem; margin:10px 0;" class="neon-txt">${this.state.reports.length}</h1>
                                <button class="btn-nebula" onclick="App.navigate('diff')">GERENCIAR LOGS</button>
                            </div>
                        </div>`;
                }

                else if (this.state.view === 'calc') {
                    container.innerHTML = `
                        <div class="card-nebula" style="max-width:600px; margin:auto;">
                            <h3 class="neon-txt">ESTIMATIVA DE SAFRA</h3>
                            <div style="margin-top:25px;">
                                <label><small>ÁREA TOTAL (HECTARES)</small></label>
                                <input type="number" id="inp-area" class="nebula-input" placeholder="Ex: 100">
                                <label><small>PRODUTIVIDADE ALVO (SACAS/HA)</small></label>
                                <input type="number" id="inp-prod" class="nebula-input" placeholder="Ex: 60">
                                <label><small>VALOR DE MERCADO (R$/SACA)</small></label>
                                <input type="number" id="inp-price" class="nebula-input" placeholder="Ex: 135">
                                <button class="btn-nebula" onclick="App.runCalculation()">CALCULAR RETORNO</button>
                            </div>
                            <div id="calc-result" style="display:none; margin-top:30px; text-align:center; border-top:1px solid var(--border); padding-top:20px;">
                                <h2 id="res-sacas" class="neon-g">0 SACAS</h2>
                                <h3 id="res-val" style="opacity:0.6;">R$ 0,00</h3>
                            </div>
                        </div>`;
                }

                else if (this.state.view === 'diff') {
                    container.innerHTML = `
                        <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:30px;">
                            <div class="card-nebula">
                                <h3 class="neon-txt">NOVO REGISTRO</h3>
                                <select id="rep-type" class="nebula-input" style="margin-top:20px;">
                                    <option>Clima</option><option>Pragas</option><option>Maquinário</option><option>Logística</option>
                                </select>
                                <textarea id="rep-msg" class="nebula-input" style="height:120px;" placeholder="Descreva o ocorrido..."></textarea>
                                <button class="btn-nebula" onclick="App.saveReport()">SALVAR NO LOG</button>
                            </div>
                            <div class="card-nebula">
                                <h3 class="neon-txt">LOG DE EVENTOS</h3>
                                <div style="margin-top:20px; max-height:400px; overflow-y:auto;">
                                    ${this.state.reports.slice().reverse().map((r, i) => `
                                        <div class="report-item">
                                            <i class="fas fa-trash btn-delete" onclick="App.deleteReport(${this.state.reports.length - 1 - i})"></i>
                                            <small style="color:var(--neon-b)">${r.date} | ${r.type}</small>
                                            <p style="margin-top:8px;">${r.msg}</p>
                                        </div>
                                    `).join('') || '<p style="opacity:0.3;">Nenhum registro no banco de dados.</p>'}
                                </div>
                            </div>
                        </div>`;
                }

                else if (this.state.view === 'help') {
                    container.innerHTML = `
                        <div class="card-nebula">
                            <h3 class="neon-txt">CENTRAL DE SUPORTE</h3>
                            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-top:30px;">
                                <div style="padding:20px; border:1px solid var(--border); border-radius:20px; cursor:pointer;" onclick="alert('Iniciando Chat com Agrônomo...')">
                                    <i class="fas fa-comments-alt neon-g"></i><h4>Suporte Vivo</h4><p><small>Fale com um especialista.</small></p>
                                </div>
                                <div style="padding:20px; border:1px solid var(--border); border-radius:20px; cursor:pointer;" onclick="alert('Abrindo Manuais Técnicos...')">
                                    <i class="fas fa-book neon-b"></i><h4>Documentação</h4><p><small>Guias do sistema.</small></p>
                                </div>
                            </div>
                        </div>`;
                }
            },

            // LÓGICA FUNCIONAL DOS BOTÕES
            runCalculation() {
                const a = document.getElementById('inp-area').value;
                const p = document.getElementById('inp-prod').value;
                const v = document.getElementById('inp-price').value;
                
                if(!a || !p || !v) return alert("Preencha todos os campos!");

                const sacas = a * p;
                const total = sacas * v;

                document.getElementById('calc-result').style.display = 'block';
                document.getElementById('res-sacas').innerText = `${sacas.toLocaleString()} SACAS`;
                document.getElementById('res-val').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            },

            saveReport() {
                const msg = document.getElementById('rep-msg').value;
                if(!msg) return;

                const newReport = {
                    date: new Date().toLocaleDateString('pt-BR') + ' ' + new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
                    type: document.getElementById('rep-type').value,
                    msg: msg
                };

                this.state.reports.push(newReport);
                localStorage.setItem('neb_data', JSON.stringify(this.state.reports));
                this.renderContent();
            },

            deleteReport(index) {
                this.state.reports.splice(index, 1);
                localStorage.setItem('neb_data', JSON.stringify(this.state.reports));
                this.renderContent();
            }
        };
    </script>
</body>
</html>
