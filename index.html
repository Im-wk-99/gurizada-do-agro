<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroOS Enterprise | Sistema de Gestão</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --accent: #238636;
            --accent-hover: #2ea043;
            --text: #c9d1d9;
            --white: #f0f6fc;
            --danger: #da3633;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        aside { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .logo { padding: 30px; font-weight: 800; color: var(--white); font-size: 1.2rem; border-bottom: 1px solid var(--border); }
        .nav-link { padding: 15px 30px; cursor: pointer; border-bottom: 1px solid transparent; transition: 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.05); }
        .nav-link.active { color: var(--accent); border-left: 4px solid var(--accent); background: rgba(35, 134, 54, 0.1); }

        /* Main Section */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--surface); }
        .content { padding: 30px; overflow-y: auto; flex: 1; }

        /* Componentes de Dados */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: var(--white); font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        /* Formulários */
        input, select { 
            width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); 
            border-radius: 6px; color: var(--white); margin: 8px 0;
        }
        .btn { 
            background: var(--accent); color: white; border: none; padding: 12px 20px; 
            border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--danger); }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .badge-success { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
    </style>
</head>
<body>

<aside>
    <div class="logo"><i class="fas fa-leaf"></i> AGRO OS PRO</div>
    <div class="nav-link active" onclick="App.route('home')"><i class="fas fa-home"></i> Painel Geral</div>
    <div class="nav-link" onclick="App.route('stock')"><i class="fas fa-boxes"></i> Inventário Insumos</div>
    <div class="nav-link" onclick="App.route('finance')"><i class="fas fa-wallet"></i> Financeiro</div>
    <div class="nav-link" onclick="App.route('calc')"><i class="fas fa-calculator"></i> Calculadora Agrícola</div>
    <div class="nav-link" onclick="App.route('fleet')"><i class="fas fa-tractor"></i> Frota</div>
</aside>

<main>
    <header>
        <div id="page-title">Dashboard</div>
        <div id="weather-api" style="color: var(--accent); font-weight: 600;">Reserva-PR: 28°C Sol</div>
    </header>
    <div class="content" id="view">
        </div>
</main>

<script>
// --- LÓGICA DE NEGÓCIO (DATABASE) ---
const App = {
    db: {
        stock: JSON.parse(localStorage.getItem('db_stock')) || [],
        finance: JSON.parse(localStorage.getItem('db_finance')) || [],
        fleet: JSON.parse(localStorage.getItem('db_fleet')) || [
            { id: 1, nome: "Trator 7J 210", status: "Operando", diesel: 80 }
        ]
    },

    save() {
        localStorage.setItem('db_stock', JSON.stringify(this.db.stock));
        localStorage.setItem('db_finance', JSON.stringify(this.db.finance));
        localStorage.setItem('db_fleet', JSON.stringify(this.db.fleet));
    },

    route(page) {
        const view = document.getElementById('view');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        
        switch(page) {
            case 'home': this.renderHome(view); break;
            case 'stock': this.renderStock(view); break;
            case 'finance': this.renderFinance(view); break;
            case 'calc': this.renderCalc(view); break;
            case 'fleet': this.renderFleet(view); break;
        }
    },

    // --- PAINEL GERAL ---
    renderHome(el) {
        const saldo = this.db.finance.reduce((acc, cur) => cur.tipo === 'receita' ? acc + cur.valor : acc - cur.valor, 0);
        el.innerHTML = `
            <div class="grid">
                <div class="card">
                    <h3>Saldo Disponível</h3>
                    <h2 style="color:var(--accent); font-size:2rem; margin-top:10px;">R$ ${saldo.toLocaleString('pt-BR')}</h2>
                </div>
                <div class="card">
                    <h3>Insumos no Estoque</h3>
                    <h2 style="color:var(--white); font-size:2rem; margin-top:10px;">${this.db.stock.length} Itens</h2>
                </div>
            </div>
            <div class="card" style="margin-top:20px;">
                <h3>Status da Frota</h3>
                <table>
                    <thead><tr><th>Máquina</th><th>Status</th><th>Combustível</th></tr></thead>
                    <tbody>${this.db.fleet.map(f => `<tr><td>${f.nome}</td><td><span class="badge badge-success">${f.status}</span></td><td>${f.diesel}%</td></tr>`).join('')}</tbody>
                </table>
            </div>
        `;
    },

    // --- GESTÃO DE ESTOQUE (FUNCIONAL) ---
    renderStock(el) {
        el.innerHTML = `
            <div class="grid">
                <div class="card">
                    <h3>Cadastrar Insumo</h3>
                    <input type="text" id="s-nome" placeholder="Nome do Produto (Ex: Glifosato)">
                    <input type="number" id="s-qtd" placeholder="Quantidade">
                    <select id="s-un"><option>Litros</option><option>Sacos</option><option>Kg</option></select>
                    <button class="btn" onclick="App.addStock()">Adicionar ao Estoque</button>
                </div>
                <div class="card" style="grid-column: span 2;">
                    <h3>Inventário Atual</h3>
                    <table>
                        <thead><tr><th>Produto</th><th>Qtd</th><th>Unidade</th><th>Ação</th></tr></thead>
                        <tbody id="stock-list">${this.db.stock.map((s, i) => `<tr><td>${s.nome}</td><td>${s.qtd}</td><td>${s.un}</td><td><button onclick="App.delStock(${i})" style="color:var(--danger); background:none; border:none; cursor:pointer;">Remover</button></td></tr>`).join('')}</tbody>
                    </table>
                </div>
            </div>
        `;
    },

    addStock() {
        const nome = document.getElementById('s-nome').value;
        const qtd = document.getElementById('s-qtd').value;
        const un = document.getElementById('s-un').value;
        if(nome && qtd) {
            this.db.stock.push({nome, qtd, un});
            this.save(); this.route('stock');
        }
    },

    delStock(i) { this.db.stock.splice(i, 1); this.save(); this.route('stock'); },

    // --- FINANCEIRO (FUNCIONAL) ---
    renderFinance(el) {
        el.innerHTML = `
            <div class="grid">
                <div class="card">
                    <h3>Novo Lançamento</h3>
                    <select id="f-tipo"><option value="receita">Receita (Venda)</option><option value="despesa">Despesa (Custo)</option></select>
                    <input type="text" id="f-desc" placeholder="Descrição">
                    <input type="number" id="f-valor" placeholder="Valor R$">
                    <button class="btn" onclick="App.addFinance()">Lançar</button>
                </div>
                <div class="card" style="grid-column: span 2;">
                    <h3>Extrato Recente</h3>
                    <table>
                        <thead><tr><th>Descrição</th><th>Tipo</th><th>Valor</th></tr></thead>
                        <tbody>${this.db.finance.map(f => `<tr><td>${f.desc}</td><td style="color:${f.tipo === 'receita' ? '#3fb950' : '#da3633'}">${f.tipo.toUpperCase()}</td><td>R$ ${f.valor}</td></tr>`).join('')}</tbody>
                    </table>
                </div>
            </div>
        `;
    },

    addFinance() {
        const desc = document.getElementById('f-desc').value;
        const valor = parseFloat(document.getElementById('f-valor').value);
        const tipo = document.getElementById('f-tipo').value;
        if(desc && valor) {
            this.db.finance.push({desc, valor, tipo});
            this.save(); this.route('finance');
        }
    },

    // --- CALCULADORA AGRONÔMICA (LÓGICA REAL) ---
    renderCalc(el) {
        el.innerHTML = `
            <div class="card" style="max-width: 500px; margin: auto;">
                <h3 style="text-align:center; margin-bottom:20px;">Calculadora de Vazão (Pulverização)</h3>
                <label>Taxa de Aplicação Desejada (L/ha)</label>
                <input type="number" id="c-taxa" value="100">
                <label>Velocidade do Pulverizador (km/h)</label>
                <input type="number" id="c-vel" value="8">
                <label>Espaçamento entre Bicos (metros)</label>
                <input type="number" id="c-esp" value="0.5">
                <button class="btn" onclick="App.calculate()">Calcular Vazão do Bico</button>
                
                <div id="res-calc" class="card" style="margin-top:20px; background:rgba(35, 134, 54, 0.1); border-color:var(--accent); display:none;">
                    <p style="text-align:center;">Vazão necessária por bico:</p>
                    <h2 id="vazao-final" style="text-align:center; color:var(--accent);">0.00 L/min</h2>
                </div>
            </div>
        `;
    },

    calculate() {
        const taxa = document.getElementById('c-taxa').value;
        const vel = document.getElementById('c-vel').value;
        const esp = document.getElementById('c-esp').value;
        
        // Fórmula: q = (L/ha * km/h * esp) / 600
        const q = (taxa * vel * esp) / 600;
        
        const resDiv = document.getElementById('res-calc');
        resDiv.style.display = 'block';
        document.getElementById('vazao-final').innerText = q.toFixed(2) + " L/min";
    },

    renderFleet(el) {
        el.innerHTML = `
            <div class="card">
                <h3>Máquinas no Campo</h3>
                <table>
                    <thead><tr><th>ID</th><th>Modelo</th><th>Status</th><th>Tanque</th></tr></thead>
                    <tbody>${this.db.fleet.map(f => `<tr><td>#${f.id}</td><td>${f.nome}</td><td>${f.status}</td><td>${f.diesel}%</td></tr>`).join('')}</tbody>
                </table>
            </div>
        `;
    }
};

// Inicialização
window.onload = () => App.route('home');
</script>
</body>
</html>
