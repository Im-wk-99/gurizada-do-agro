<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroOS AI | Enterprise Intelligence 2026</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>

    <style>
        :root {
            --neon-green: #00ff66; --dark-bg: #05070a; --card-bg: #0f1218;
            --border-color: #1e2631; --text-gray: #94a3b8; --white: #f8fafc;
            --accent-blue: #38bdf8; --danger-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--dark-bg); color: var(--text-gray); display: flex; height: 100vh; overflow: hidden; }

        /* --- Glassmorphism Sidebar --- */
        aside { 
            width: 300px; background: var(--card-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; position: relative; z-index: 10;
        }
        .ai-status { padding: 25px; border-bottom: 1px solid var(--border-color); background: rgba(0, 255, 102, 0.05); }
        .ai-pulse { display: inline-block; width: 10px; height: 10px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 10px var(--neon-green); animation: pulse 2s infinite; }
        
        .nav-list { flex: 1; padding: 20px 0; }
        .nav-item { 
            padding: 16px 30px; display: flex; align-items: center; gap: 15px; 
            cursor: pointer; transition: 0.3s; color: var(--text-gray);
        }
        .nav-item:hover, .nav-item.active { background: #161b22; color: var(--neon-green); border-right: 3px solid var(--neon-green); }

        /* --- Main Content Engine --- */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { 
            height: 80px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color); background: rgba(15, 18, 24, 0.8); backdrop-filter: blur(10px);
        }

        #viewport { flex: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; }

        /* --- Módulos Inteligentes --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .agro-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; transition: 0.4s; }
        .agro-card:hover { border-color: var(--neon-green); transform: translateY(-5px); }

        /* IA Chat Interface */
        .ai-chat-box { 
            height: 250px; background: #0a0d12; border-radius: 12px; padding: 15px; 
            overflow-y: auto; font-size: 0.9rem; border: 1px solid #1e2631; margin-bottom: 15px;
        }
        .ai-msg { color: var(--neon-green); margin-bottom: 10px; display: flex; gap: 10px; }

        /* Data Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; border-bottom: 1px solid var(--border-color); color: var(--white); font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #161b22; font-size: 0.85rem; }

        /* Buttons & Inputs */
        .btn-ai { background: var(--neon-green); color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-ai:hover { box-shadow: 0 0 20px rgba(0, 255, 102, 0.4); }
        input { width: 100%; background: #161b22; border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; color: white; margin-top: 10px; }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

<aside>
    <div class="ai-status">
        <div class="ai-pulse"></div> <span style="color: var(--white); font-weight: 800;">AGRO GPT 4.0</span>
        <p style="font-size: 0.7rem; margin-top: 5px;">Sistemas de IA Otimizados</p>
    </div>
    <div class="nav-list">
        <div class="nav-item active" onclick="Core.route('ia-dash')"><i class="fas fa-brain"></i> IA Insights</div>
        <div class="nav-item" onclick="Core.route('telemetria')"><i class="fas fa-satellite"></i> Telemetria 360°</div>
        <div class="nav-item" onclick="Core.route('financeiro')"><i class="fas fa-chart-line"></i> Predição Financeira</div>
        <div class="nav-item" onclick="Core.route('clima')"><i class="fas fa-bolt"></i> Hiper-Local Clima</div>
        <div class="nav-item" onclick="Core.route('estoque')"><i class="fas fa-boxes-stacked"></i> Smart Inventory</div>
    </div>
</aside>

<main>
    <header>
        <div id="breadcrumb">Enterprise / <span id="view-name">IA Insights</span></div>
        <div style="display: flex; gap: 25px; align-items: center;">
            <div id="weather-top" style="font-size: 0.9rem;"><i class="fas fa-sun"></i> 29°C Reserva-PR</div>
            <div id="main-clock" style="font-weight: 600; color: var(--white);">00:00:00</div>
        </div>
    </header>

    <div id="viewport">
        </div>
</main>

<script>
/**
 * ENGINE CENTRAL AGRO-AI
 */
const Core = {
    state: {
        activeView: 'ia-dash',
        history: [],
        fleet: [
            { id: 1, name: "JD 8R 370", fuel: 78, task: "Plantio Lote A", heat: "Normal" },
            { id: 2, name: "Case IH 340", fuel: 12, task: "Inativo", heat: "Crítico" }
        ],
        stocks: JSON.parse(localStorage.getItem('agro_stock')) || [
            { item: "Ureia", qtd: 2500, unit: "kg" },
            { item: "Diesel S10", qtd: 800, unit: "L" }
        ]
    },

    init() {
        this.updateClock();
        setInterval(() => this.updateClock(), 1000);
        this.route('ia-dash');
        this.aiThink("Sistema operacional iniciado. Analisando talhões...");
    },

    updateClock() {
        document.getElementById('main-clock').innerText = new Date().toLocaleTimeString();
    },

    async aiThink(msg) {
        const chat = document.getElementById('ai-chat');
        if(chat) {
            const div = document.createElement('div');
            div.className = 'ai-msg';
            div.innerHTML = `<i class="fas fa-robot"></i> <span>[AgroGPT]: ${msg}</span>`;
            chat.prepend(div);
            anime({ targets: div, opacity: [0, 1], translateX: [-20, 0], duration: 800 });
        }
    },

    route(view) {
        this.state.activeView = view;
        document.getElementById('view-name').innerText = view.toUpperCase();
        const vp = document.getElementById('viewport');
        
        // Router Logic
        if(view === 'ia-dash') {
            vp.innerHTML = `
                <div class="grid">
                    <div class="agro-card" style="grid-column: span 2;">
                        <div class="card-header">TERMINAL DE COMANDO IA</div>
                        <div class="ai-chat-box" id="ai-chat"></div>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="ai-input" placeholder="Pergunte à IA (Ex: Qual a melhor janela de plantio?)">
                            <button class="btn-ai" onclick="Core.processIA()">ANALISAR</button>
                        </div>
                    </div>
                    <div class="agro-card">
                        <div class="card-header">SAÚDE DA SAFRA (NDVI)</div>
                        <canvas id="ndviChart"></canvas>
                    </div>
                </div>
            `;
            this.initNdvi();
        } 
        
        else if(view === 'telemetria') {
            const rows = this.state.fleet.map(f => `
                <tr>
                    <td>${f.name}</td>
                    <td style="color: ${f.fuel < 20 ? 'var(--danger-red)' : 'var(--neon-green)'}">${f.fuel}%</td>
                    <td>${f.task}</td>
                    <td><span style="background:${f.heat === 'Crítico' ? '#442222' : '#224422'}; padding:4px 8px; border-radius:4px;">${f.heat}</span></td>
                </tr>
            `).join('');
            vp.innerHTML = `
                <div class="agro-card">
                    <div class="card-header">FROTA CONECTADA EM TEMPO REAL</div>
                    <table>
                        <thead><tr><th>MAQUINÁRIO</th><th>DIESEL</th><th>TAREFA</th><th>TEMP. MOTOR</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }
    },

    processIA() {
        const input = document.getElementById('ai-input').value;
        if(!input) return;
        this.aiThink(`Analisando solicitação: "${input}"...`);
        setTimeout(() => {
            if(input.toLowerCase().includes('plantio')) {
                this.aiThink("Baseado na umidade do solo (65%) e previsão de chuva para amanhã, o plantio deve ser acelerado nas próximas 6 horas.");
            } else {
                this.aiThink("Relatórios financeiros indicam alta de 3% nos fertilizantes. Recomendo compra antecipada.");
            }
        }, 1500);
        document.getElementById('ai-input').value = "";
    },

    initNdvi() {
        const ctx = document.getElementById('ndviChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Semana 1', 'Semana 2', 'Semana 3', 'Semana 4'],
                datasets: [{
                    label: 'Índice de Vigor Vegetativo',
                    data: [0.4, 0.6, 0.85, 0.82],
                    borderColor: '#00ff66',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(0, 255, 102, 0.1)'
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { y: { grid: { color: '#1e2631' } }, x: { grid: { display: false } } }
            }
        });
    }
};

window.onload = () => Core.init();
</script>
</body>
</html>
