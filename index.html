<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gurizada do Agro | Pro Management</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1b4332;
            --accent: #74c69d;
            --warning: #ffb703;
            --danger: #e63946;
            --bg: #0b090a;
            --card-bg: #161a1d;
            --text: #f5f3f4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg); color: var(--text); }

        /* Splash Screen */
        #splash {
            position: fixed; height: 100vh; width: 100%; background: var(--primary);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; transition: 0.8s;
        }

        /* Dashboard Layout */
        .app-container { display: none; min-height: 100vh; }
        
        nav {
            background: var(--card-bg); padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary);
        }

        .main-content { padding: 30px 5%; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }

        .card {
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin-bottom: 20px;
        }

        h2 { color: var(--accent); margin-bottom: 15px; font-size: 1rem; text-transform: uppercase; }

        /* Form Estilizado */
        input, select {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px;
            border: 1px solid #333; background: #0b090a; color: white;
        }

        .btn {
            background: var(--primary); color: white; padding: 12px 20px;
            border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold;
        }

        .btn:hover { background: var(--accent); color: var(--primary); }

        /* Listagem */
        .task-item {
            display: flex; justify-content: space-between; padding: 10px;
            border-bottom: 1px solid #333; align-items: center;
        }

        .badge { background: var(--warning); color: black; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }

        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="font-size: 3rem; letter-spacing: 5px;">AGRO-TECH</h1>
        <p>SISTEMA OPERACIONAL GURIZADA DO AGRO</p>
        <button class="btn" onclick="startApp()" style="margin-top: 20px; width: auto;">INICIALIZAR MOTORES</button>
    </div>

    <div class="app-container" id="app">
        <nav>
            <div style="font-weight: bold; color: var(--accent);">🚜 GURIZADA DO AGRO <span style="color:white">| PRO</span></div>
            <div id="clock">00:00:00</div>
        </nav>

        <div class="main-content">
            <section>
                <div class="card">
                    <h2>Análise de Produtividade (Simulação)</h2>
                    <canvas id="yieldChart" height="100"></canvas>
                </div>

                <div class="card">
                    <h2>Calculadora de Calagem (Método V%)</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <input type="number" id="v2" placeholder="V% Desejado">
                        <input type="number" id="v1" placeholder="V% Atual (Análise)">
                        <input type="number" id="ctc" placeholder="CTC Total">
                        <input type="number" id="prnt" placeholder="PRNT do Calcário">
                    </div>
                    <button class="btn" onclick="calcCalagem()">CALCULAR TON/HA</button>
                    <div id="resultCalagem" style="margin-top: 15px; font-weight: bold; color: var(--warning);"></div>
                </div>
            </section>

            <aside>
                <div class="card">
                    <h2>Logística de Trecho</h2>
                    <input type="text" id="taskInput" placeholder="Nova ordem de serviço...">
                    <button class="btn" onclick="saveTask()">REGISTRAR NO SISTEMA</button>
                    <div id="taskList" style="margin-top: 15px;"></div>
                </div>

                <div class="card">
                    <h2>Status da Máquina</h2>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span>Combustível</span>
                        <span style="color: var(--danger);">12% - ABASTECER</span>
                    </div>
                    <div style="width: 100%; background: #333; height: 10px; border-radius: 5px;">
                        <div style="width: 12%; background: var(--danger); height: 100%; border-radius: 5px;"></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // Inicialização e Relógio
        function startApp() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                renderChart();
                loadTasks();
            }, 800);
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Lógica de Tarefas com LocalStorage (Persistência)
        function saveTask() {
            const input = document.getElementById('taskInput');
            if(!input.value) return;
            
            let tasks = JSON.parse(localStorage.getItem('agroTasks')) || [];
            tasks.push({ text: input.value, time: new Date().toLocaleDateString() });
            localStorage.setItem('agroTasks', JSON.stringify(tasks));
            input.value = '';
            loadTasks();
        }

        function loadTasks() {
            const list = document.getElementById('taskList');
            let tasks = JSON.parse(localStorage.getItem('agroTasks')) || [];
            list.innerHTML = tasks.map((t, i) => `
                <div class="task-item">
                    <span>${t.text}</span>
                    <button onclick="deleteTask(${i})" style="background:none; border:none; color:var(--danger); cursor:pointer;">✖</button>
                </div>
            `).join('');
        }

        function deleteTask(index) {
            let tasks = JSON.parse(localStorage.getItem('agroTasks'));
            tasks.splice(index, 1);
            localStorage.setItem('agroTasks', JSON.stringify(tasks));
            loadTasks();
        }

        // Engenharia: Cálculo de Calagem
        function calcCalagem() {
            const v2 = parseFloat(document.getElementById('v2').value);
            const v1 = parseFloat(document.getElementById('v1').value);
            const ctc = parseFloat(document.getElementById('ctc').value);
            const prnt = parseFloat(document.getElementById('prnt').value);

            if(v2 && v1 && ctc && prnt) {
                // Fórmula: NC (t/ha) = [CTC x (V2 - V1)] / (10 x PRNT)
                const nc = (ctc * (v2 - v1)) / prnt;
                document.getElementById('resultCalagem').innerText = `Necessidade: ${nc.toFixed(2)} Ton/ha`;
            } else {
                alert("Preencha todos os dados da análise de solo!");
            }
        }

        // Gráfico de Performance (Chart.js)
        function renderChart() {
            const ctx = document.getElementById('yieldChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Safra 21', 'Safra 22', 'Safra 23', 'Safra 24', 'Safra 25', 'Safra 26'],
                    datasets: [{
                        label: 'Sacas por Hectare',
                        data: [62, 68, 65, 74, 82, 88],
                        borderColor: '#74c69d',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(116, 198, 157, 0.1)'
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: false }, x: { grid: { color: '#333' } } },
                    plugins: { legend: { labels: { color: '#f5f3f4' } } }
                }
            });
        }
    </script>
</body>
</html>
