<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroOS | Night Precision</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff88;
            --deep-black: #020304;
            --card-night: rgba(10, 12, 16, 0.85);
            --border: rgba(0, 255, 136, 0.15);
            --text-gray: #7e8c9a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1511735111819-9a3f7709049c?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-attachment: fixed;
            color: #fff; height: 100vh; display: flex; overflow: hidden;
        }

        /* --- NAVEGAÇÃO VERTICAL --- */
        aside { 
            width: 90px; background: rgba(0, 0, 0, 0.95);
            border-right: 1px solid var(--border); display: flex;
            flex-direction: column; align-items: center; padding: 25px 0;
            transition: width 0.4s cubic-bezier(0.075, 0.82, 0.165, 1); z-index: 100;
        }
        aside:hover { width: 240px; }

        .logo { 
            width: 50px; height: 50px; background: var(--neon); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5); margin-bottom: 40px;
        }

        .nav-link {
            width: 100%; padding: 18px 30px; display: flex; align-items: center;
            gap: 20px; color: var(--text-gray); cursor: pointer; transition: 0.3s;
            white-space: nowrap; text-decoration: none;
        }
        .nav-link i { font-size: 1.3rem; min-width: 30px; }
        .nav-link:hover, .nav-link.active { color: var(--neon); background: rgba(0, 255, 136, 0.05); }

        /* --- CONTEÚDO PRINCIPAL --- */
        main { flex: 1; padding: 35px; overflow-y: auto; background: radial-gradient(circle at top right, rgba(0, 255, 136, 0.03), transparent); }

        .header-glass {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px; background: var(--card-night); border-radius: 20px;
            border: 1px solid var(--border); margin-bottom: 35px;
            backdrop-filter: blur(20px);
        }

        /* --- CALCULADORA STYLE --- */
        .calc-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px;
        }

        .calc-card {
            background: var(--card-night); border: 1px solid var(--border);
            border-radius: 24px; padding: 30px; position: relative; overflow: hidden;
        }

        .calc-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--neon);
        }

        .calc-input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: var(--text-gray); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; color: #fff; font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon); outline: none; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }

        .result-box {
            background: rgba(0, 255, 136, 0.1); border: 1px dashed var(--neon);
            padding: 25px; border-radius: 16px; text-align: center; margin-top: 20px;
        }
        .result-box h2 { font-size: 2rem; color: var(--neon); }

        /* --- IMAGENS ILUSTRATIVAS --- */
        .illustration {
            width: 100%; height: 160px; border-radius: 16px; object-fit: cover;
            margin-bottom: 20px; border: 1px solid var(--border);
            filter: saturate(1.2) brightness(0.8); transition: 0.5s;
        }
        .calc-card:hover .illustration { filter: saturate(1.5) brightness(1); }

        .btn-calc {
            background: var(--neon); color: #000; border: none; padding: 18px;
            border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-calc:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 255, 136, 0.4); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
    </style>
</head>
<body>

<aside>
    <div class="logo"><i class="fas fa-satellite-dish"></i></div>
    <div class="nav-link active" onclick="Core.route('dash')"><i class="fas fa-chart-line"></i> <span>Dashboard</span></div>
    <div class="nav-link" onclick="Core.route('calc')"><i class="fas fa-calculator"></i> <span>Calculadora</span></div>
    <div class="nav-link" onclick="Core.route('fleet')"><i class="fas fa-tractor"></i> <span>Frota Ativa</span></div>
    <div class="nav-link" onclick="Core.route('weather')"><i class="fas fa-bolt"></i> <span>Clima IA</span></div>
</aside>

<main>
    <div class="header-glass">
        <div>
            <h1 id="view-title">AgroOS Night Horizon</h1>
            <p style="color: var(--neon); font-size: 0.8rem; font-weight: 600;">OPERANDO EM MODO NOTURNO ALTO CONTRASTE</p>
        </div>
        <div style="text-align: right">
            <div id="sys-clock" style="font-size: 1.2rem; font-weight: 800;">00:00:00</div>
            <p style="font-size: 0.7rem; opacity: 0.5;">RESERVA - PR</p>
        </div>
    </div>

    <div id="app-content"></div>
</main>

<script>
const Core = {
    init() {
        this.route('dash');
        setInterval(() => {
            document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    },

    route(page) {
        const container = document.getElementById('app-content');
        document.getElementById('view-title').innerText = page.toUpperCase();
        
        // Ativar link na sidebar
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

        switch(page) {
            case 'dash': this.renderDash(container); break;
            case 'calc': this.renderCalc(container); break;
            case 'fleet': container.innerHTML = `<div class="calc-card"><h2>Frota Sincronizada</h2><p>Todos os tratores JD 8R em operação noturna.</p></div>`; break;
            case 'weather': container.innerHTML = `<div class="calc-card"><h2>Previsão IA</h2><p>Céu limpo. Visibilidade: 15km.</p></div>`; break;
        }
    },

    renderDash(el) {
        el.innerHTML = `
            <div class="calc-container">
                <div class="calc-card">
                    <img src="https://images.unsplash.com/photo-1595113316349-9fa4eb24f884?q=80&w=1000&auto=format&fit=crop" class="illustration">
                    <h3>Status da Safra</h3>
                    <p style="margin: 15px 0; font-size: 0.9rem; opacity: 0.7;">Monitoramento térmico detectou solo em 22°C. Condição ideal para absorção de nitrogênio.</p>
                    <div class="result-box">
                        <small>PRODUTIVIDADE ESTIMADA</small>
                        <h2>74 sc/ha</h2>
                    </div>
                </div>
                <div class="calc-card">
                    <img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854?q=80&w=1000&auto=format&fit=crop" class="illustration">
                    <h3>Fluxo Financeiro</h3>
                    <canvas id="nightChart" height="180"></canvas>
                </div>
            </div>
        `;
        this.initChart();
    },

    renderCalc(el) {
        el.innerHTML = `
            <div class="calc-container">
                <div class="calc-card">
                    <img src="https://images.unsplash.com/photo-1586771107445-d3ca888129ff?q=80&w=1000&auto=format&fit=crop" class="illustration">
                    <h3>Dosagem de Defensivos</h3>
                    <div class="calc-input-group">
                        <label>Área do Talhão (Hectares)</label>
                        <input type="number" id="calc-area" value="100" oninput="Core.runCalc()">
                    </div>
                    <div class="calc-input-group">
                        <label>Dose Recomendada (L/ha)</label>
                        <input type="number" id="calc-dose" value="1.5" oninput="Core.runCalc()">
                    </div>
                    <div class="result-box">
                        <small>VOLUME TOTAL NECESSÁRIO</small>
                        <h2 id="res-total">150 Litros</h2>
                    </div>
                </div>

                <div class="calc-card">
                    <img src="https://images.unsplash.com/photo-1592982537447-7440770cbfc9?q=80&w=1000&auto=format&fit=crop" class="illustration">
                    <h3>Calibragem de Bicos (Vazão)</h3>
                    <div class="calc-input-group">
                        <label>Velocidade do Trator (km/h)</label>
                        <input type="number" id="calc-vel" value="8" oninput="Core.runCalc()">
                    </div>
                    <div class="calc-input-group">
                        <label>Espaçamento entre Bicos (m)</label>
                        <input type="number" id="calc-esp" value="0.5" oninput="Core.runCalc()">
                    </div>
                    <div class="result-box" style="border-color: #38bdf8; background: rgba(56, 189, 248, 0.1);">
                        <small style="color: #38bdf8;">VAZÃO DO BICO (L/min)</small>
                        <h2 id="res-vazao" style="color: #38bdf8;">1.25</h2>
                    </div>
                </div>
            </div>
        `;
    },

    runCalc() {
        const area = parseFloat(document.getElementById('calc-area')?.value) || 0;
        const dose = parseFloat(document.getElementById('calc-dose')?.value) || 0;
        const vel = parseFloat(document.getElementById('calc-vel')?.value) || 1;
        const esp = parseFloat(document.getElementById('calc-esp')?.value) || 0.5;

        // Total Calcs
        if(document.getElementById('res-total')) {
            document.getElementById('res-total').innerText = (area * dose).toFixed(1) + " Litros";
        }
        
        // Vazão Calc: (L/ha * km/h * esp) / 600
        if(document.getElementById('res-vazao')) {
            const vazao = (150 * vel * esp) / 600; // Exemplo baseado em 150L/ha padrão
            document.getElementById('res-vazao').innerText = vazao.toFixed(2);
        }
    },

    initChart() {
        const ctx = document.getElementById('nightChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex'],
                datasets: [{
                    data: [400, 450, 420, 500, 480],
                    borderColor: '#00ff88',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(0, 255, 136, 0.05)'
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }
};

window.onload = () => Core.init();
</script>
</body>
</html>
