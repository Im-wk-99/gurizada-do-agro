<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroOS Horizon | Cinematic Intelligence</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #20ff88;
            --bg-overlay: rgba(5, 6, 8, 0.85); /* Escurecimento do fundo */
            --card-bg: rgba(20, 25, 32, 0.6); /* Transparência dos cards */
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        
        body { 
            /* Plano de Fundo Principal */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Glass */
        aside { 
            width: 100px; 
            background: rgba(0, 0, 0, 0.4);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            backdrop-filter: blur(15px);
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        
        aside:hover { width: 260px; background: rgba(0, 0, 0, 0.8); }

        .logo-circle {
            width: 50px; height: 50px;
            background: var(--accent);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: #000; font-weight: bold; font-size: 1.5rem;
            margin-bottom: 50px;
            box-shadow: 0 0 20px rgba(32, 255, 136, 0.3);
        }

        .nav-item {
            width: 220px; padding: 15px 25px; margin: 5px 0;
            display: flex; align-items: center; gap: 20px;
            cursor: pointer; border-radius: 12px; transition: 0.3s;
            color: #fff;
        }

        .nav-item i { min-width: 30px; font-size: 1.2rem; text-align: center; }
        .nav-item span { opacity: 0; transition: 0.3s; white-space: nowrap; }
        aside:hover .nav-item span { opacity: 1; }
        .nav-item:hover, .nav-item.active { background: rgba(32, 255, 136, 0.15); color: var(--accent); }

        /* Conteúdo Principal */
        main { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px; padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px; backdrop-filter: blur(5px);
            border: 1px solid var(--border);
        }

        .status-pill {
            background: rgba(32, 255, 136, 0.1);
            padding: 8px 15px; border-radius: 20px;
            border: 1px solid var(--accent);
            display: flex; align-items: center; gap: 10px;
            font-size: 0.8rem; color: var(--accent);
        }

        .pulse {
            width: 8px; height: 8px; background: var(--accent);
            border-radius: 50%; animation: softPulse 2s infinite;
        }

        @keyframes softPulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(32, 255, 136, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(32, 255, 136, 0); } 100% { transform: scale(1); } }

        /* Grid e Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            animation: slideUp 0.6s ease-out forwards;
            backdrop-filter: blur(12px);
        }

        .card:hover { 
            transform: translateY(-10px); 
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        input, select {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 15px;
        }

        .btn {
            background: var(--accent); color: #000; border: none; padding: 15px;
            border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%;
            transition: 0.3s;
        }

        #ai-display {
            height: 150px; overflow-y: auto; background: rgba(0,0,0,0.5);
            border-radius: 15px; padding: 15px; font-size: 0.85rem;
            border: 1px solid var(--border); margin: 15px 0; color: var(--accent);
        }

        .img-header {
            width: 100%; height: 140px; border-radius: 15px;
            object-fit: cover; margin-bottom: 15px; opacity: 0.8;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="logo-circle">A</div>
    <div class="nav-menu">
        <div class="nav-item active" onclick="Core.route('dash')"><i class="fas fa-chart-pie"></i> <span>Dashboard</span></div>
        <div class="nav-item" onclick="Core.route('fields')"><i class="fas fa-map-marked-alt"></i> <span>Talhões</span></div>
        <div class="nav-item" onclick="Core.route('fleet')"><i class="fas fa-satellite"></i> <span>Telemetria</span></div>
        <div class="nav-item" onclick="Core.route('stock')"><i class="fas fa-warehouse"></i> <span>Estoque</span></div>
        <div class="nav-item" onclick="Core.route('finance')"><i class="fas fa-wallet"></i> <span>Financeiro</span></div>
    </div>
</aside>

<main>
    <header>
        <div>
            <h1 id="page-title" style="color: #fff; font-size: 1.8rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Centro de Comando</h1>
            <p style="font-size: 0.9rem; color: var(--accent);">Reserva, PR | <span id="clock" style="color:#fff">00:00:00</span></p>
        </div>
        <div class="status-pill">
            <div class="pulse"></div>
            SISTEMA AGRO-AI ONLINE
        </div>
    </header>

    <div id="app-viewport">
        </div>
</main>

<script>
const Core = {
    data: {
        fleet: JSON.parse(localStorage.getItem('h_fleet')) || [{id: 1, name: "John Deere 8R", fuel: 75}],
        stock: JSON.parse(localStorage.getItem('h_stock')) || [{id: 1, item: "Diesel S10", qty: 2500}],
        fields: JSON.parse(localStorage.getItem('h_fields')) || [{id: 1, name: "Talhão Norte", area: 150}],
        finance: JSON.parse(localStorage.getItem('h_finance')) || { income: 500000, expense: 120000 },
        logs: ["Interface Orbital Carregada.", "Sensores de solo sincronizados."]
    },

    init() {
        this.route('dash');
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    },

    save() {
        localStorage.setItem('h_fleet', JSON.stringify(this.data.fleet));
        localStorage.setItem('h_stock', JSON.stringify(this.data.stock));
        localStorage.setItem('h_fields', JSON.stringify(this.data.fields));
        localStorage.setItem('h_finance', JSON.stringify(this.data.finance));
    },

    route(page) {
        const vp = document.getElementById('app-viewport');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-title').innerText = page.toUpperCase();

        switch(page) {
            case 'dash': this.renderDash(vp); break;
            case 'fields': this.renderFields(vp); break;
            case 'fleet': this.renderFleet(vp); break;
            case 'stock': this.renderStock(vp); break;
            case 'finance': this.renderFinance(vp); break;
        }
    },

    renderDash(vp) {
        vp.innerHTML = `
            <div class="grid">
                <div class="card" style="grid-column: span 2;">
                    <img src="https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?q=80&w=1000&auto=format&fit=crop" class="img-header">
                    <h2 style="margin-bottom: 10px; color:#fff;">Análise AgroGPT</h2>
                    <div id="ai-display"></div>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="ai-cmd" placeholder="Solicitar relatório de umidade...">
                        <button class="btn" onclick="Core.askAI()" style="width:120px;">IA EXEC</button>
                    </div>
                </div>
                <div class="card">
                    <h3 style="color:#fff; margin-bottom:20px;">Distribuição de Capital</h3>
                    <canvas id="financeChart" height="250"></canvas>
                </div>
            </div>
        `;
        this.updateAILog();
        this.initChart();
    },

    renderFields(vp) {
        const list = this.data.fields.map(f => `
            <div class="card" style="margin-bottom:15px; display:flex; justify-content:space-between; background: rgba(0,0,0,0.5);">
                <span>${f.name}</span><b>${f.area} ha</b>
            </div>
        `).join('');
        vp.innerHTML = `<div class="grid"><div class="card"><h3>Novo Talhão</h3><input id="f-name" placeholder="Nome"><input id="f-area" placeholder="Hectares"><button class="btn" onclick="Core.addField()">CADASTRAR</button></div><div>${list}</div></div>`;
    },

    addField() {
        const name = document.getElementById('f-name').value;
        const area = document.getElementById('f-area').value;
        if(name && area) {
            this.data.fields.push({id: Date.now(), name, area});
            this.save(); this.route('fields');
        }
    },

    renderFleet(vp) {
        const items = this.data.fleet.map(f => `
            <div class="card">
                <h4 style="color:#fff;">${f.name}</h4>
                <div style="height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin:15px 0;">
                    <div style="width:${f.fuel}%; height:100%; background:var(--accent);"></div>
                </div>
                <p>Nível Diesel: ${f.fuel}%</p>
            </div>
        `).join('');
        vp.innerHTML = `<div class="grid">${items}</div>`;
    },

    renderStock(vp) {
        const rows = this.data.stock.map(s => `<tr><td style="padding:15px; border-bottom:1px solid var(--border);">${s.item}</td><td>${s.qty}</td></tr>`).join('');
        vp.innerHTML = `<div class="card"><table style="width:100%; color:#fff;"><thead><tr style="text-align:left; color:var(--accent);"><th>ITEM</th><th>QTD</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    },

    renderFinance(vp) {
        vp.innerHTML = `
            <div class="grid">
                <div class="card">
                    <h3>Movimentação</h3>
                    <select id="fin-type"><option value="income">Receita</option><option value="expense">Despesa</option></select>
                    <input type="number" id="fin-val" placeholder="Valor R$">
                    <button class="btn" onclick="Core.addFin()">PROCESSAR</button>
                </div>
                <div class="card">
                    <h3>Saldo em Caixa</h3>
                    <h1 style="color:var(--accent); font-size:2.8rem; text-shadow: 0 0 20px rgba(32,255,136,0.3);">R$ ${(this.data.finance.income - this.data.finance.expense).toLocaleString()}</h1>
                </div>
            </div>
        `;
    },

    addFin() {
        const type = document.getElementById('fin-type').value;
        const val = parseFloat(document.getElementById('fin-val').value) || 0;
        this.data.finance[type] += val;
        this.save(); this.route('finance');
    },

    askAI() {
        const cmd = document.getElementById('ai-cmd').value;
        if(!cmd) return;
        this.aiLog(`> ${cmd}`);
        setTimeout(() => {
            this.aiLog(`AgroGPT: Sensores indicam janela de plantio ideal para amanhã. Clima em Reserva: 28°C.`);
        }, 800);
        document.getElementById('ai-cmd').value = '';
    },

    aiLog(m) {
        this.data.logs.unshift(`[${new Date().toLocaleTimeString()}] ${m}`);
        this.updateAILog();
    },

    updateAILog() {
        const log = document.getElementById('ai-display');
        if(log) log.innerHTML = this.data.logs.map(l => `<div style="margin-bottom:5px;">${l}</div>`).join('');
    },

    initChart() {
        const ctx = document.getElementById('financeChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Receita', 'Custos'],
                datasets: [{
                    data: [this.data.finance.income, this.data.finance.expense],
                    backgroundColor: ['#20ff88', '#ff4757'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '85%', plugins: { legend: { display: false } } }
        });
    }
};

window.onload = () => Core.init();
</script>
</body>
</html>
