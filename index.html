<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gurizada do Agro | Official</title>
    <style>
        :root {
            --primary: #2d5a27;
            --accent: #f8961e;
            --bg: #f4f4f4;
            --text: #1b1b1b;
            --card-bg: #ffffff;
            --overlay: rgba(0, 0, 0, 0.6);
        }

        .dark-mode {
            --bg: #121212;
            --text: #f4f4f4;
            --card-bg: #1e1e1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }

        /* --- TELA INICIAL (HERO) --- */
        #home-screen {
            height: 100vh;
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?auto=format&fit=crop&q=80&w=1500');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        #home-screen h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 3px; }
        #home-screen p { font-size: 1.2rem; margin-bottom: 30px; max-width: 600px; opacity: 0.9; }

        .main-btn {
            background: var(--accent);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .main-btn:hover { transform: scale(1.1); background: #e67e22; box-shadow: 0 0 20px rgba(248, 150, 30, 0.5); }

        /* --- DASHBOARD (ESCONDIDO POR PADRÃO) --- */
        #dashboard { display: none; padding-top: 80px; }

        header {
            background: var(--primary);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .container { max-width: 900px; margin: 20px auto; padding: 20px; }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            border-left: 8px solid var(--primary);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: center; }
        .stats-val { font-size: 2.5rem; font-weight: bold; color: var(--primary); display: block; }

        /* LISTA FUNCIONAL */
        .input-group { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: var(--card-bg); color: var(--text); }
        
        ul { list-style: none; margin-top: 20px; }
        li { 
            background: rgba(0,0,0,0.05); 
            padding: 12px; 
            margin-bottom: 8px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between;
            animation: fadeIn 0.4s;
        }

        .btn-del { background: #ff4757; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .back-btn { background: none; border: 1px solid white; color: white; padding: 5px 10px; cursor: pointer; border-radius: 5px; margin-right: 10px; }
    </style>
</head>
<body>

    <section id="home-screen">
        <h1>GURIZADA DO AGRO</h1>
        <p>Gestão pesada para quem vive o trecho. Tecnologia e tradição em um só lugar.</p>
        <button class="main-btn" onclick="showDashboard()">ACESSAR OPERAÇÕES</button>
    </section>

    <main id="dashboard">
        <header>
            <div>
                <button class="back-btn" onclick="showHome()">← Sair</button>
                <strong>DASHBOARD AGRO</strong>
            </div>
            <button class="main-btn" style="padding: 5px 15px; font-size: 0.8rem;" onclick="toggleTheme()">Mudar Clima</button>
        </header>

        <div class="container">
            <div class="card">
                <h2>Status da Safra</h2>
                <div class="stats-grid">
                    <div>
                        <span class="stats-val">114</span>
                        <p>Dias p/ Colheita</p>
                    </div>
                    <div>
                        <span class="stats-val">82%</span>
                        <p>Umidade Solo</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Caderno de Campo Digital</h2>
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="Ex: Adubar talhão 04...">
                    <button class="main-btn" style="border-radius: 8px;" onclick="addTask()">OK</button>
                </div>
                <ul id="taskList">
                    <li><span>Revisar filtros da colheitadeira</span><button class="btn-del" onclick="this.parentElement.remove()">X</button></li>
                </ul>
            </div>
        </div>
    </main>

    <script>
        // Navegação entre telas
        function showDashboard() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            window.scrollTo(0,0);
        }

        function showHome() {
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        // Modo Escuro
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        // Adicionar Tarefa
        function addTask() {
            const input = document.getElementById('taskInput');
            if (input.value.trim() === "") return;
            
            const li = document.createElement('li');
            li.innerHTML = `<span>${input.value}</span><button class="btn-del" onclick="this.parentElement.remove()">X</button>`;
            document.getElementById('taskList').appendChild(li);
            input.value = "";
        }

        // Atalho Enter
        document.getElementById('taskInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
