<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroOS Pro | Sistema de Gestão Total</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-card: #161b22;
            --primary: #238636;
            --accent: #2ea043;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --danger: #da3633;
            --warning: #d29922;
            --card-img-height: 120px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-deep); color: var(--text-main); overflow-x: hidden; }

        .app-grid { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
        
        aside { background: var(--bg-card); border-right: 1px solid #30363d; padding: 20px; position: sticky; top: 0; height: 100vh; }
        main { padding: 30px; }

        .logo { font-size: 1.4rem; font-weight: 800; color: var(--accent); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }

        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 10px; border: 1px solid #30363d; position: relative; overflow: hidden; }
        .stat-card i { position: absolute; right: 15px; bottom: 15px; font-size: 2rem; opacity: 0.1; }

        /* Module Grid */
        .module-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
        .card { background: var(--bg-card); border: 1px solid #30363d; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Imagens Ilustrativas */
        .card-banner { 
            width: 100%; 
            height: var(--card-img-height); 
            background-size: cover; 
            background-position: center;
            border-bottom: 1px solid #30363d;
            filter: grayscale(30%) brightness(70%);
        }

        .card-header { background: #21262d; padding: 15px 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 20px; flex-grow: 1; }

        /* Forms */
        input, select { 
            width: 100%; padding: 10px; margin-bottom: 15px; 
            background: var(--bg-deep); border: 1px solid #30363d; 
            border-radius: 6px; color: white; outline: none; 
        }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--accent); }

        /* Listas */
        .data-list { max-height: 200px; overflow-y: auto; margin-top: 15px; }
        .item { 
            background: var(--bg-deep); padding: 10px; border-radius: 8px; 
            margin-bottom: 8px; display: flex; justify-content: space-between; 
            align-items: center; border-left: 4px solid var(--primary); font-size: 0.9rem;
        }
        .delete-btn { color: var(--danger); cursor: pointer; background: none; border: none; }

        /* Progresso */
        .progress-container { width: 100%; background: #333; height: 8px; border-radius: 4px; margin: 8px 0; }
        .progress-fill { height: 100%; border-radius: 4px; transition: 0.5s; }

        @media (max-width: 1100px) { .module-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .app-grid { grid-template-columns: 1fr; } aside { display: none; } }
    </style>
</head>
<body>

<div class="app-grid">
    <aside>
        <div class="logo"><i class="fas fa-leaf"></i> AGRO-OS</div>
        <div style="color: var(--text-dim); font-size: 0.85rem;">
            <p><i class="fas fa-calendar-alt"></i> <span id="current-date">--/--/--</span></p>
            <p><i class="fas fa-clock"></i> <span id="current-time">00:00</span></p>
        </div>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #30363d;">
        <nav style="display: flex; flex-direction: column; gap: 10px; color: var(--text-dim);">
            <span><i class="fas fa-chart-line"></i> Dashboard</span>
            <span><i class="fas fa-tractor"></i> Maquinário</span>
            <span><i class="fas fa-seedling"></i> Safra 2024/25</span>
        </nav>
    </aside>

    <main>
        <div class="stats-row">
            <div class="stat-card">
                <span>Tarefas Ativas</span>
                <h2 id="count-os">0</h2>
                <i class="fas fa-clipboard-list"></i>
            </div>
            <div class="stat-card">
                <span>Insumos</span>
                <h2 id="count-insumos">0</h2>
                <i class="fas fa-boxes"></i>
            </div>
            <div class="stat-card">
                <span>Diesel Médio</span>
                <h2 id="avg-fuel">0%</h2>
                <i class="fas fa-gas-pump"></i>
            </div>
        </div>

        <div class="module-grid">
            <div class="card">
                <div class="card-banner" style="background-image: url('https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?auto=format&fit=crop&w=500&q=80')"></div>
                <div class="card-header">ORDENS DE SERVIÇO</div>
                <div class="card-body">
                    <input type="text" id="os-task" placeholder="Ex: Aplicação de Ureia Lote 4">
                    <select id="os-priority">
                        <option value="normal">Normal</option>
                        <option value="urgent">Urgente</option>
                    </select>
                    <button class="btn btn-primary" onclick="Core.addOS()">REGISTRAR</button>
                    <div class="data-list" id="list-os"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-banner" style="background-image: url('https://images.unsplash.com/photo-1589923188900-85dae523342b?auto=format&fit=crop&w=500&q=80')"></div>
                <div class="card-header">ESTOQUE</div>
                <div class="card-body">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="ins-name" placeholder="Produto">
                        <input type="number" id="ins-qty" style="width: 80px" placeholder="Qtd">
                    </div>
                    <button class="btn btn-primary" onclick="Core.addInsumo()">ATUALIZAR</button>
                    <div class="data-list" id="list-insumos"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-banner" style="background-image: url('https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&w=500&q=80')"></div>
                <div class="card-header">PULVERIZAÇÃO (L/ha)</div>
                <div class="card-body">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label style="font-size: 0.7rem;">VELOC. (km/h)</label>
                            <input type="number" id="calc-v" value="8" oninput="Core.calculateVazao()">
                        </div>
                        <div>
                            <label style="font-size: 0.7rem;">VAZÃO BICO (L/min)</label>
                            <input type="number" id="calc-q" value="1.2" oninput="Core.calculateVazao()">
                        </div>
                    </div>
                    <div style="background: var(--bg-deep); padding: 15px; border-radius: 8px; text-align: center;">
                        <h2 id="calc-res" style="color: var(--accent);">180.00 L/ha</h2>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-banner" style="background-image: url('https://images.unsplash.com/photo-1594411633005-779836374026?auto=format&fit=crop&w=500&q=80')"></div>
                <div class="card-header">TELEMÉTRIA</div>
                <div class="card-body">
                    <div class="machine-item">
                        <span style="font-size: 0.8rem;">JD 6125J</span>
                        <div class="progress-container"><div id="fuel-bar-1" class="progress-fill"></div></div>
                        <input type="range" min="0" max="100" value="75" oninput="Core.updateFuel(1, this.value)">
                    </div>
                    <div class="machine-item" style="margin-top: 15px;">
                        <span style="font-size: 0.8rem;">CASE MAGNUM 340</span>
                        <div class="progress-container"><div id="fuel-bar-2" class="progress-fill"></div></div>
                        <input type="range" min="0" max="100" value="30" oninput="Core.updateFuel(2, this.value)">
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const Core = {
        db: {
            os: JSON.parse(localStorage.getItem('agro_os')) || [],
            insumos: JSON.parse(localStorage.getItem('agro_ins')) || [],
            fuel: JSON.parse(localStorage.getItem('agro_fuel')) || { 1: 75, 2: 30 }
        },

        init() {
            this.updateClock();
            setInterval(() => this.updateClock(), 1000);
            this.renderAll();
            this.calculateVazao();
            this.updateFuel(1, this.db.fuel[1]);
            this.updateFuel(2, this.db.fuel[2]);
        },

        updateClock() {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('pt-BR');
            document.getElementById('current-time').innerText = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        },

        addOS() {
            const task = document.getElementById('os-task').value;
            const priority = document.getElementById('os-priority').value;
            if(!task) return;
            this.db.os.push({ id: Date.now(), task, priority });
            this.save();
            document.getElementById('os-task').value = "";
            this.renderAll();
        },

        removeOS(id) {
            this.db.os = this.db.os.filter(i => i.id !== id);
            this.save();
            this.renderAll();
        },

        addInsumo() {
            const name = document.getElementById('ins-name').value;
            const qty = document.getElementById('ins-qty').value;
            if(!name || !qty) return;
            this.db.insumos.push({ id: Date.now(), name, qty });
            this.save();
            document.getElementById('ins-name').value = "";
            document.getElementById('ins-qty').value = "";
            this.renderAll();
        },

        removeInsumo(id) {
            this.db.insumos = this.db.insumos.filter(i => i.id !== id);
            this.save();
            this.renderAll();
        },

        updateFuel(id, val) {
            this.db.fuel[id] = val;
            const bar = document.getElementById(`fuel-bar-${id}`);
            bar.style.width = val + '%';
            bar.style.background = val < 20 ? 'var(--danger)' : val < 50 ? 'var(--warning)' : 'var(--accent)';
            this.save();
            this.updateStats();
        },

        calculateVazao() {
            const v = parseFloat(document.getElementById('calc-v').value) || 1;
            const q = parseFloat(document.getElementById('calc-q').value) || 0;
            const e = 0.5; // Espaçamento fixo para o exemplo
            const res = (600 * q) / (v * e);
            document.getElementById('calc-res').innerText = res.toFixed(2) + " L/ha";
        },

        save() {
            localStorage.setItem('agro_os', JSON.stringify(this.db.os));
            localStorage.setItem('agro_ins', JSON.stringify(this.db.insumos));
            localStorage.setItem('agro_fuel', JSON.stringify(this.db.fuel));
        },

        updateStats() {
            document.getElementById('count-os').innerText = this.db.os.length;
            document.getElementById('count-insumos').innerText = this.db.insumos.length;
            const avg = (parseInt(this.db.fuel[1]) + parseInt(this.db.fuel[2])) / 2;
            document.getElementById('avg-fuel').innerText = avg.toFixed(0) + "%";
        },

        renderAll() {
            document.getElementById('list-os').innerHTML = this.db.os.map(i => `
                <div class="item ${i.priority === 'urgent' ? 'urgent' : ''}" style="${i.priority === 'urgent' ? 'border-left-color: var(--danger)' : ''}">
                    <span>${i.task}</span>
                    <button class="delete-btn" onclick="Core.removeOS(${i.id})"><i class="fas fa-check"></i></button>
                </div>
            `).join('');

            document.getElementById('list-insumos').innerHTML = this.db.insumos.map(i => `
                <div class="item">
                    <span>${i.name}</span>
                    <span><strong>${i.qty}</strong> <button class="delete-btn" onclick="Core.removeInsumo(${i.id})"><i class="fas fa-trash"></i></button></span>
                </div>
            `).join('');
            this.updateStats();
        }
    };

    Core.init();
</script>

</body>
</html>
