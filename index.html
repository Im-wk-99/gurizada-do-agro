<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Enterprise v4.0 | Login</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@200;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ========================================
           ESTILOS DA TELA DE ENTRADA (SPLASH)
           ======================================== */
        :root {
            --neon-p: #bc13fe; --neon-g: #20ff88; --neon-b: #00d2ff;
            --bg-deep: #020205; --glass: rgba(12, 10, 20, 0.85);
            --border: rgba(188, 19, 254, 0.3);
            --font-head: 'Orbitron', sans-serif;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-deep); overflow: hidden; }

        #splash-screen {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        #splash-screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.5); }

        .orb-portal {
            width: 200px; height: 200px; border-radius: 50%;
            background: var(--neon-p); filter: blur(80px); opacity: 0.3;
            position: absolute; animation: pulseOrb 4s infinite alternate;
        }

        @keyframes pulseOrb { from { transform: scale(1); opacity: 0.2; } to { transform: scale(1.5); opacity: 0.5; } }

        .welcome-content { text-align: center; z-index: 10; }
        .welcome-content h2 { 
            font-family: var(--font-head); color: #fff; letter-spacing: 15px; 
            margin-bottom: 30px; text-shadow: 0 0 20px var(--neon-p);
        }

        .btn-simulate {
            padding: 25px 60px; font-family: var(--font-head); font-size: 1.2rem;
            background: transparent; color: var(--neon-g); border: 2px solid var(--neon-g);
            border-radius: 50px; cursor: pointer; position: relative; overflow: hidden;
            transition: 0.4s; box-shadow: 0 0 15px rgba(32, 255, 136, 0.2);
        }

        .btn-simulate:hover {
            background: var(--neon-g); color: #000; box-shadow: 0 0 40px var(--neon-g);
            transform: translateY(-5px);
        }

        .scanline {
            width: 100%; height: 2px; background: rgba(32, 255, 136, 0.1);
            position: absolute; animation: scan 3s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        /* ========================================
           CSS DO APP (ORIGINAL + ADAPTAÇÕES)
           ======================================== */
        #app-interface { 
            opacity: 0; transition: 2s ease-in; display: flex; height: 100vh; width: 100vw;
        }
        #app-interface.visible { opacity: 1; }

        /* Copiando estilos funcionais do Nebula */
        body { color: #e0e0e0; font-family: 'Outfit', sans-serif; }
        #nebula-canvas { position: fixed; inset: 0; z-index: -5; background-size: cover; background-position: center; filter: brightness(0.18) blur(2px); }
        .grid-mask { position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.08; z-index: -4; pointer-events: none; }
        
        aside { width: 100px; background: var(--glass); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 40px 0; transition: 0.5s; z-index: 100; backdrop-filter: blur(50px); }
        aside:hover { width: 280px; }
        .logo-core { width: 65px; height: 65px; background: linear-gradient(135deg, var(--neon-p), #6a00ff); border-radius: 20px; display: grid; place-items: center; box-shadow: 0 0 25px rgba(188, 19, 254, 0.4); margin-bottom: 60px; cursor: pointer; }
        
        .nav-link { width: 85%; padding: 20px; margin: 12px 0; border-radius: 22px; display: flex; align-items: center; gap: 25px; cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.3); white-space: nowrap; overflow: hidden; }
        .nav-link i { font-size: 1.6rem; min-width: 45px; text-align: center; }
        .nav-link span { font-family: 'Orbitron'; font-size: 0.8rem; opacity: 0; }
        aside:hover .nav-link span { opacity: 1; }
        .nav-link.active { color: var(--neon-g); border-left: 4px solid var(--neon-p); background: rgba(188, 19, 254, 0.1); }

        main { flex: 1; padding: 45px; overflow-y: auto; position: relative; }
        .header-system { display: flex; justify-content: space-between; margin-bottom: 50px; border-bottom: 2px solid var(--border); padding-bottom: 35px; }
        .neon-txt { color: var(--neon-p); text-shadow: 0 0 20px var(--neon-p); }

        .card-nebula { background: var(--glass); border: 1px solid var(--border); border-radius: 40px; padding: 40px; backdrop-filter: blur(30px); margin-bottom: 30px; animation: slideUp 0.7s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .nebula-input, .nebula-textarea { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid var(--border); padding: 20px; border-radius: 18px; color: #fff; margin-bottom: 20px; outline: none; }
        .nebula-textarea { min-height: 120px; resize: none; }
        .btn-nebula { width: 100%; background: linear-gradient(135deg, var(--neon-p), #7a00ff); border: none; padding: 20px; border-radius: 20px; color: #fff; font-family: 'Orbitron'; font-weight: 800; cursor: pointer; }
        
        .report-item { background: rgba(255, 71, 87, 0.05); border: 1px solid rgba(255, 71, 87, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .report-header { display: flex; justify-content: space-between; color: var(--danger); font-weight: bold; margin-bottom: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="scanline"></div>
        <div class="orb-portal"></div>
        <div class="welcome-content">
            <i class="fas fa-atom" style="font-size: 4rem; color: var(--neon-p); margin-bottom: 20px;"></i>
            <h2>NEBULA ENTERPRISE</h2>
            <p style="color: #fff; opacity: 0.5; margin-bottom: 50px; letter-spacing: 3px;">SISTEMA DE COMANDO E CONTROLE AGRÍCOLA</p>
            <button class="btn-simulate" onclick="Kernel.startSimulation()">
                <i class="fas fa-bolt"></i> INICIAR SIMULAÇÃO
            </button>
        </div>
    </div>

    <div id="app-interface">
        <div id="nebula-canvas"></div>
        <div class="grid-mask"></div>

        <aside>
            <div class="logo-core" onclick="location.reload()"><i class="fas fa-atom"></i></div>
            <nav id="sidebar-nav"></nav>
            <div style="margin-top: auto; padding-bottom: 40px; width: 100%; text-align: center;">
                <div class="nav-link" onclick="location.reload()"><i class="fas fa-power-off"></i><span>TERMINAR</span></div>
            </div>
        </aside>

        <main>
            <header class="header-system">
                <div class="title-group">
                    <h1 style="font-family: 'Orbitron'; font-size: 2.5rem; margin:0;">NEBULA <span class="neon-txt">OS</span></h1>
                    <p id="path-display" style="opacity: 0.4; font-size: 0.8rem;">ESTADO: STANDBY</p>
                </div>
                <div style="text-align: right;">
                    <div id="clock" style="font-family: 'Orbitron'; color: var(--neon-g); font-size: 1.5rem;">00:00:00</div>
                    <div id="sensor-api" style="font-size: 0.7rem; opacity: 0.6;">CONECTANDO AO SATÉLITE...</div>
                </div>
            </header>

            <section id="viewport-root"></section>
        </main>
    </div>

    <script>
        const Kernel = {
            state: {
                view: 'dash',
                reports: JSON.parse(localStorage.getItem('neb_reports')) || [],
                assets: {
                    dash: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000',
                    help: 'https://images.unsplash.com/photo-1504148455328-c376907d081c?q=80&w=2000'
                }
            },

            // FUNÇÃO DE TELEPORTE
            startSimulation() {
                const splash = document.getElementById('splash-screen');
                const app = document.getElementById('app-interface');
                
                splash.classList.add('hidden');
                app.classList.add('visible');
                
                setTimeout(() => {
                    this.boot();
                }, 500);
            },

            boot() {
                this.renderSidebar();
                this.navigate('dash');
                this.startClock();
                this.startTelemetry();
            },

            startClock() {
                setInterval(() => {
                    document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
                }, 1000);
            },

            startTelemetry() {
                setInterval(() => {
                    const t = (24 + Math.random() * 4).toFixed(1);
                    const h = (45 + Math.random() * 10).toFixed(0);
                    document.getElementById('sensor-api').innerHTML = `SATELLITE LINK: OK | TEMP: ${t}°C | HUM: ${h}%`;
                }, 3000);
            },

            navigate(target) {
                this.state.view = target;
                document.getElementById('nebula-canvas').style.backgroundImage = `url('${this.state.assets[target] || this.state.assets.dash}')`;
                document.getElementById('path-display').innerText = `SYSTEM // ROOT // ${target.toUpperCase()}`;
                
                this.renderSidebar();
                this.renderView();
            },

            renderSidebar() {
                const items = [
                    {id: 'dash', icon: 'fa-chart-network', label: 'DASHBOARD'},
                    {id: 'help', icon: 'fa-hand-holding-medical', label: 'DIFICULDADES'}
                ];
                document.getElementById('sidebar-nav').innerHTML = items.map(i => `
                    <div class="nav-link ${this.state.view === i.id ? 'active' : ''}" onclick="Kernel.navigate('${i.id}')">
                        <i class="fas ${i.icon}"></i><span>${i.label}</span>
                    </div>
                `).join('');
            },

            renderView() {
                const root = document.getElementById('viewport-root');
                if(this.state.view === 'dash') {
                    root.innerHTML = `
                        <div class="card-nebula">
                            <h3 class="neon-txt">BEM-VINDO AO COMANDO CENTRAL</h3>
                            <p>O simulador está processando dados em tempo real da Reserva, PR.</p>
                            <div style="display:flex; gap:20px; margin-top:30px;">
                                <div style="flex:1; padding:20px; border: 1px solid var(--border); border-radius:15px; text-align:center;">
                                    <small>RELATÓRIOS</small><br><b style="font-size:1.5rem;">${this.state.reports.length}</b>
                                </div>
                                <div style="flex:1; padding:20px; border: 1px solid var(--border); border-radius:15px; text-align:center;">
                                    <small>LATÊNCIA</small><br><b style="font-size:1.5rem; color:var(--neon-g);">12ms</b>
                                </div>
                            </div>
                        </div>
                    `;
                } else if(this.state.view === 'help') {
                    root.innerHTML = `
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
                            <div class="card-nebula">
                                <h3 class="neon-txt">REGISTRAR OCORRÊNCIA</h3>
                                <select id="h-type" class="nebula-input">
                                    <option>Clima / Intempéries</option>
                                    <option>Pragas / Doenças</option>
                                    <option>Maquinário</option>
                                </select>
                                <textarea id="h-msg" class="nebula-textarea" placeholder="Descreva o problema..."></textarea>
                                <button class="btn-nebula" onclick="Kernel.addReport()">ENVIAR RELATÓRIO</button>
                            </div>
                            <div class="card-nebula">
                                <h3 class="neon-txt">HISTÓRICO</h3>
                                <div style="max-height:400px; overflow-y:auto;">
                                    ${this.state.reports.slice().reverse().map(r => `
                                        <div class="report-item">
                                            <div class="report-header"><span>${r.type}</span><span>${r.date}</span></div>
                                            <p>${r.msg}</p>
                                        </div>
                                    `).join('') || '<p style="opacity:0.5;">Nenhum registro encontrado.</p>'}
                                </div>
                            </div>
                        </div>
                    `;
                }
            },

            addReport() {
                const type = document.getElementById('h-type').value;
                const msg = document.getElementById('h-msg').value;
                if(!msg) return;

                const report = { date: new Date().toLocaleDateString('pt-BR'), type, msg };
                this.state.reports.push(report);
                localStorage.setItem('neb_reports', JSON.stringify(this.state.reports));
                this.renderView();
            }
        };
    </script>
</body>
</html>
