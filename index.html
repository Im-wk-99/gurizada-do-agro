<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroOS Horizon | Weather Intelligence</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #20ff88;
            --bg-overlay: rgba(5, 6, 8, 0.88);
            --card-bg: rgba(20, 25, 32, 0.65);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e0f0;
            --warning: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        
        body { 
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Glass */
        aside { 
            width: 100px; 
            background: rgba(0, 0, 0, 0.5);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 0; backdrop-filter: blur(20px);
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        aside:hover { width: 260px; background: rgba(0, 0, 0, 0.9); }

        .logo-circle {
            width: 50px; height: 50px; background: var(--accent); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: #000; font-weight: bold; font-size: 1.5rem; margin-bottom: 50px;
            box-shadow: 0 0 20px rgba(32, 255, 136, 0.4);
        }

        .nav-item {
            width: 220px; padding: 15px 25px; margin: 5px 0;
            display: flex; align-items: center; gap: 20px;
            cursor: pointer; border-radius: 12px; transition: 0.3s; color: #fff;
        }
        .nav-item:hover, .nav-item.active { background: rgba(32, 255, 136, 0.15); color: var(--accent); }

        /* Main Content */
        main { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid var(--border);
        }

        .status-pill {
            background: rgba(32, 255, 136, 0.1); padding: 8px 15px; border-radius: 20px;
            border: 1px solid var(--accent); display: flex; align-items: center; gap: 10px;
            font-size: 0.8rem; color: var(--accent);
        }

        .pulse {
            width: 8px; height: 8px; background: var(--accent);
            border-radius: 50%; animation: softPulse 2s infinite;
        }

        @keyframes softPulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(32, 255, 136, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(32, 255, 136, 0); } 100% { transform: scale(1); } }

        /* Dashboard Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        
        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(15px);
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        /* Weather UI */
        .weather-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .temp-main { font-size: 3.5rem; font-weight: 700; color: #fff; line-height: 1; }
        .weather-badge { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 10px; font-size: 0.8rem; }

        .prediction-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }

        #ai-display {
            height: 120px; overflow-y: auto; background: rgba(0,0,0,0.4);
            border-radius: 15px; padding: 15px; font-size: 0.85rem;
            border: 1px solid var(--border); margin: 15px 0; color: var(--accent);
        }

        .btn {
            background: var(--accent); color: #000; border: none; padding: 15px;
            border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn:hover { box-shadow: 0 0 20px var(--accent); transform: scale(1.02); }

        input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 10px;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<aside>
    <div class="logo-circle">A</div>
    <div class="nav-menu">
        <div class="nav-item active" onclick="Core.route('dash')"><i class="fas fa-chart-line"></i> <span>Dashboard</span></div>
        <div class="nav-item" onclick="Core.route('weather')"><i class="fas fa-cloud-sun-rain"></i> <span>Clima IA</span></div>
        <div class="nav-item" onclick="Core.route('fields')"><i class="fas fa-seedling"></i> <span>Talhões</span></div>
        <div class="nav-item" onclick="Core.route('fleet')"><i class="fas fa-truck-monster"></i> <span>Frota</span></div>
        <div class="nav-item" onclick="Core.route('finance')"><i class="fas fa-coins"></i> <span>Financeiro</span></div>
    </div>
</aside>

<main>
    <header>
        <div>
            <h1 id="page-title" style="color: #fff; font-size: 1.5rem;">Resumo Operacional</h1>
            <p style="font-size: 0.85rem; color: var(--accent);">Reserva, PR | <span id="clock" style="color:#fff">00:00:00</span></p>
        </div>
        <div class="status-pill">
            <div class="pulse"></div>
            AGRO-GPT 4.0: MONITORANDO PRECIPITAÇÃO
        </div>
    </header>

    <div id="app-viewport"></div>
</main>

<script>
const Core = {
    data: {
        fleet: JSON.parse(localStorage.getItem('h_fleet')) || [{id: 1, name: "Case IH 340", fuel: 88}],
        fields: JSON.parse(localStorage.getItem('h_fields')) || [{id: 1, name: "Talhão Leste", area: 85}],
        finance: JSON.parse(localStorage.getItem('h_finance')) || { income: 620000, expense: 210000 },
        weather: { temp: 28, hum: 42, wind: 14, cond: "Ensolarado", forecast: [
            { day: "Amanhã", t: 29, cond: "Parcial. Nublado", rain: "10%" },
            { day: "Sábado", t: 24, cond: "Chuva Forte", rain: "95%" },
            { day: "Domingo", t: 22, cond: "Nublado", rain: "20%" }
        ]},
        logs: ["Sistema Meteorológico Sincronizado.", "Dados de satélite atualizados."]
    },

    init() {
        this.route('dash');
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    },

    route(page) {
        const vp = document.getElementById('app-viewport');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-title').innerText = page.toUpperCase();

        switch(page) {
            case 'dash': this.renderDash(vp); break;
            case 'weather': this.renderWeather(vp); break;
            case 'fields': this.renderFields(vp); break;
            case 'fleet': this.renderFleet(vp); break;
            case 'finance': this.renderFinance(vp); break;
        }
    },

    renderDash(vp) {
        vp.innerHTML = `
            <div class="grid">
                <div class="card" style="grid-column: span 2;">
                    <div class="weather-info">
                        <div>
                            <p style="text-transform:uppercase; font-size:0.7rem; letter-spacing:1px;">Tempo Atual</p>
                            <div class="temp-main">${this.data.weather.temp}°C</div>
                            <p>${this.data.weather.cond} | Vento ${this.data.weather.wind}km/h</p>
                        </div>
                        <i class="fas fa-sun fa-4x" style="color:var(--accent)"></i>
                    </div>
                    <div id="ai-display"></div>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="ai-cmd" placeholder="Pergunte sobre a janela de colheita...">
                        <button class="btn" onclick="Core.askAI()" style="width:120px;">IA ANALYZE</button>
                    </div>
                </div>
                <div class="card">
                    <h3 style="color:#fff; margin-bottom:15px;">Alerta de Chuva</h3>
                    <canvas id="weatherChart" height="200"></canvas>
                </div>
            </div>
        `;
        this.updateAILog();
        this.initWeatherChart();
    },

    renderWeather(vp) {
        const rows = this.data.weather.forecast.map(f => `
            <div class="prediction-row">
                <span><b>${f.day}</b></span>
                <span>${f.cond}</span>
                <span style="color:var(--accent)">${f.t}°C</span>
                <span style="color:#38bdf8"><i class="fas fa-droplet"></i> ${f.rain}</span>
            </div>
        `).join('');

        vp.innerHTML = `
            <div class="grid">
                <div class="card">
                    <h3>Previsão Estendida</h3>
                    <div style="margin-top:20px;">${rows}</div>
                </div>
                <div class="card">
                    <h3 style="color:var(--warning)"><i class="fas fa-exclamation-triangle"></i> Recomendação IA</h3>
                    <p style="margin-top:15px; line-height:1.6;">
                        Identificamos uma frente fria chegando no <b>Sábado</b>. 
                        Recomendamos finalizar a aplicação de defensivos até amanhã às 16:00 para evitar lavagem do produto pela chuva de 95% de probabilidade.
                    </p>
                </div>
            </div>
        `;
    },

    // Funções de apoio (Mesma lógica das anteriores, mantendo funcionalidade)
    renderFields(vp) {
        vp.innerHTML = `<div class="card"><h3>Gestão de Talhões</h3><p>Módulo de mapeamento ativo. Adicione áreas para monitoramento.</p></div>`;
    },
    renderFleet(vp) {
        vp.innerHTML = `<div class="card"><h3>Frota Ativa</h3><p>Monitorando ${this.data.fleet.length} unidades via GPS.</p></div>`;
    },
    renderFinance(vp) {
        vp.innerHTML = `<div class="card"><h3>Fluxo de Caixa</h3><h1>R$ ${(this.data.finance.income - this.data.finance.expense).toLocaleString()}</h1></div>`;
    },

    askAI() {
        const cmd = document.getElementById('ai-cmd').value;
        if(!cmd) return;
        this.aiLog(`> ${cmd}`);
        setTimeout(() => {
            if(cmd.toLowerCase().includes("chuva")) {
                this.aiLog("AgroGPT: Chuva confirmada para Sábado (45mm). Janela de plantio fecha em 24h.");
            } else {
                this.aiLog("AgroGPT: Analisando microclima... Condições estáveis para as próximas 12 horas.");
            }
        }, 800);
        document.getElementById('ai-cmd').value = '';
    },

    aiLog(m) {
        this.data.logs.unshift(`[${new Date().toLocaleTimeString()}] ${m}`);
        this.updateAILog();
    },

    updateAILog() {
        const log = document.getElementById('ai-display');
        if(log) log.innerHTML = this.data.logs.map(l => `<div style="margin-bottom:5px;">${l}</div>`).join('');
    },

    initWeatherChart() {
        const ctx = document.getElementById('weatherChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Sex', 'Sáb', 'Dom'],
                datasets: [{
                    label: 'Probabilidade de Chuva %',
                    data: [10, 95, 20],
                    backgroundColor: ['rgba(32, 255, 136, 0.5)', '#38bdf8', 'rgba(32, 255, 136, 0.5)'],
                    borderRadius: 10
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#fff' } } } }
        });
    }
};

window.onload = () => Core.init();
</script>
</body>
</html>
